<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tournament Manager - 9-th Vojvodina Open ITF</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #1a3a6c;
        --primary-dark: #0d2a52;
        --secondary: #d4af37;
        --light: #f8f9fa;
        --dark: #212529;
        --success: #28a745;
        --danger: #dc3545;
        --warning: #ffc107;
        --gray: #6c757d;
        --light-gray: #e9ecef;
        --border: #dee2e6;
        --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        --transition: all 0.3s ease;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f5f7fa;
        color: var(--dark);
        line-height: 1.6;
        padding: 20px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      header {
        text-align: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 2px solid var(--secondary);
      }
      h1 {
        font-size: 2rem;
        color: var(--primary);
        margin-bottom: 5px;
        font-weight: 700;
      }
      .subtitle {
        color: var(--gray);
        font-size: 1rem;
      }
      .nav {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.95rem;
      }
      .btn-sm {
        padding: 5px 12px;
        font-size: 0.85rem;
      }
      .btn-xs {
        padding: 2px 6px;
        font-size: 0.75rem;
      }
      .btn-primary {
        background: var(--primary);
        color: white;
      }
      .btn-primary:hover {
        background: var(--primary-dark);
      }
      .btn-secondary {
        background: var(--light-gray);
        color: var(--dark);
      }
      .btn-secondary:hover {
        background: #dcdcdc;
      }
      .btn-success {
        background: var(--success);
        color: white;
      }
      .btn-danger {
        background: var(--danger);
        color: white;
      }
      .btn-warning {
        background: var(--warning);
        color: #212529;
      }
      .btn-warning:hover {
        background: #e0a800;
      }
      .btn-active {
        background: var(--secondary);
        color: #fff;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
      }
      .filters-card {
        background: white;
        border-radius: 12px;
        box-shadow: var(--shadow);
        padding: 20px;
        margin-bottom: 20px;
        border-left: 5px solid var(--secondary);
      }
      .filters {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        align-items: flex-end;
      }
      .filter-group {
        flex: 1;
        min-width: 150px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: var(--gray);
        font-size: 0.85rem;
      }
      select,
      input[type="date"] {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 0.95rem;
        outline: none;
        transition: var(--transition);
      }
      .info-banner {
        background: #e7f3ff;
        color: var(--primary);
        padding: 12px;
        border-radius: 6px;
        margin-top: 15px;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .category-card {
        background: white;
        border-radius: 12px;
        box-shadow: var(--shadow);
        margin-bottom: 25px;
        overflow: hidden;
        border-top: 4px solid var(--primary);
      }
      .category-header {
        background: var(--primary);
        color: white;
        padding: 12px 20px;
        font-size: 1.1rem;
        font-weight: 700;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .parallel-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        border-bottom: 1px solid var(--border);
      }
      .col-header {
        background: var(--light-gray);
        padding: 10px;
        text-align: center;
        font-weight: 700;
        color: var(--primary);
        border-bottom: 2px solid var(--border);
        text-transform: uppercase;
        font-size: 0.85rem;
      }
      .row-item {
        padding: 10px 15px;
        border-bottom: 1px dashed #e0e0e0;
        font-size: 0.95rem;
        color: var(--dark);
        display: flex;
        align-items: center;
      }
      .row-item:last-child {
        border-bottom: none;
      }
      .col-list:nth-child(2) .row-item {
        background-color: #fafafa;
      }
      .col-list:nth-child(2) .row-item:hover {
        background-color: #f0f0f0;
      }
      .a4-page {
        background: white;
        width: 210mm;
        min-height: 297mm;
        margin: 20px auto;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        padding: 15mm;
        display: flex;
        flex-direction: column;
        page-break-after: always;
      }
      .bracket-header {
        text-align: center;
        border-bottom: 2px solid var(--secondary);
        padding-bottom: 10px;
        margin-bottom: 10px;
      }
      .bracket-header h2 {
        color: var(--primary);
        margin: 0;
        text-transform: uppercase;
      }
      .bracket-table {
        width: 100%;
        border-collapse: collapse;
        flex: 1;
        table-layout: fixed;
      }
      .bracket-table tbody {
        height: 100%;
      }
      .bracket-table th {
        background-color: var(--light-gray);
        color: var(--primary);
        padding: 8px;
        font-size: 0.9rem;
        border: 1px solid var(--border);
        text-align: center;
        width: 1%;
      }
      .bracket-table td {
        border: 1px solid var(--border);
        padding: 0;
        vertical-align: middle;
      }
      .bracket-table tbody tr {
        height: calc(100% / var(--row-count));
      }
      .match-cell {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        padding: 2px;
      }
      .match-box {
        background: #fff;
        border: 1px solid #ccc;
        border-left: 3px solid var(--primary);
        padding: 4px 8px;
        font-size: 0.85rem;
        border-radius: 4px;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow: hidden;
      }
      .match-box.bye {
        background: #f9f9f9;
        border-left: 3px solid #ccc;
        color: #999;
        font-style: italic;
      }
      .match-box.empty {
        background: #fcfcfc;
        border-left: 3px dashed #bbb;
        border: 1px dashed #ddd;
      }
      .p-name:empty::before {
        content: "________________";
        color: #ccc;
        display: block;
        white-space: pre;
      }
      .p-name:empty:focus::before {
        content: "";
      }
      .p-name {
        min-width: 80px;
        min-height: 1.2em;
        display: inline-block;
        outline: none;
        cursor: text;
      }
      .p-name:focus {
        background-color: #fffbe6;
        border-radius: 2px;
      }
      .player-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2px;
        padding: 2px 4px;
        border-radius: 4px;
        transition: background 0.2s;
        gap: 4px;
        cursor: grab;
      }
      .player-row:active {
        cursor: grabbing;
      }
      .player-row.dragging {
        opacity: 0.6;
        background: #ffe082 !important;
        transform: scale(1.02);
      }
      .player-row.drag-over {
        background: #c8e6c9 !important;
        border: 2px dashed var(--success);
      }
      .player-row .player-info {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-width: 0;
      }
      .p-name {
        font-weight: 600;
      }
      .p-team {
        font-size: 0.75rem;
        color: #666;
      }
      .delete-btn {
        background: var(--danger);
        color: white;
        border: none;
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 0.7rem;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .player-row:hover .delete-btn {
        opacity: 1;
      }
      .vs-divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 4px 0;
        font-size: 10px;
        color: #999;
        font-weight: 700;
      }
      .vs-divider::before,
      .vs-divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #ccc;
      }
      .vs-divider:not(:empty)::before {
        margin-right: 6px;
      }
      .vs-divider:not(:empty)::after {
        margin-left: 6px;
      }
      .controls {
        text-align: center;
        margin-bottom: 20px;
        padding: 15px;
        background: white;
        border-radius: 8px;
        box-shadow: var(--shadow);
      }
      .deleted-card {
        background: white;
        border-radius: 12px;
        box-shadow: var(--shadow);
        margin-bottom: 15px;
        padding: 12px 15px;
        border-left: 4px solid var(--danger);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .deleted-info {
        flex: 1;
      }
      .deleted-info strong {
        display: block;
        color: var(--primary);
      }
      .deleted-info small {
        color: var(--gray);
      }
      .deleted-actions {
        display: flex;
        gap: 5px;
      }
      @media print {
        @page {
          size: A4;
          margin: 10mm;
        }
        body {
          margin: 0;
          padding: 0;
          background: white;
          -webkit-print-color-adjust: exact;
        }
        * {
          box-sizing: border-box;
        }
        .nav,
        .filters-card,
        .controls,
        .subtitle {
          display: none !important;
        }
        .container {
          max-width: none;
          width: 100%;
          margin: 0;
          padding: 0;
        }
        .a4-page {
          margin: 0;
          box-shadow: none;
          page-break-after: always;
          display: flex;
          flex-direction: column;
        }
        .p-name:empty::before {
          color: #999;
          border-bottom: 1px solid #000;
          content: "";
          display: block;
          height: 1em;
        }
      }
      @media (max-width: 768px) {
        .parallel-container {
          grid-template-columns: 1fr;
          border-bottom: none;
        }
        .col-list:nth-child(2) {
          border-top: 2px solid var(--border);
        }
        .a4-page {
          width: 100%;
          min-height: auto;
          padding: 10px;
          margin-bottom: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>9-th Vojvodina Open ITF</h1>
        <p class="subtitle">Tournament Manager & Category System</p>
      </header>
      <nav class="nav">

    <script>
      /* ---------------- CONFIG ---------------- */
      const SUPABASE_URL = "https://cziwnycosdxeuacslcza.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6aXdueWNvc2R4ZXVhY3NsY3phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY3MTkxMDAsImV4cCI6MjA4MjI5NTEwMH0.7OvfatHP7RAp6JS1F5hMlwfdSDgpN7EXsY2SVMoFSoY";
      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // 🔒 ADMIN ACCESS CHECK
      if (localStorage.getItem("isAdmin") !== "true") {
        alert("Admin access required. Redirecting to main page...");
        window.location.href = "index.html";
      }

      const REG_TABLE = "final_registrations";

      let competitors = [],
        judges = [],
        coaches = [],
        tournamentDate = null;
      let currentGroups = null,
        currentBracketType = null,
        selectedSwap = null;

      const RULES = {
        SPARRING: {
          KIDS: {
            time: "2 x 1 min",
            M: ["-20", "-25", "-30", "-35", "+35"],
            F: ["-20", "-25", "-30", "-35", "+35"],
          },
          YOUTH: {
            time: "2 x 1.30 min",
            M: ["-25", "-30", "-35", "-40", "+40"],
            F: ["-25", "-30", "-35", "-40", "+40"],
          },
          OLDER_YOUTH: {
            time: "2 x 1.30 min",
            M: ["-35", "-40", "-45", "-50", "-55", "-60", "+60"],
            F: ["-30", "-35", "-40", "-45", "-50", "-55", "+55"],
          },
          JUNIORS: {
            time: "2 x 2 min",
            M: ["-45", "-50", "-55", "-60", "-65", "-70", "+70"],
            F: ["-40", "-45", "-50", "-55", "-60", "-65", "+65"],
          },
        },
      };

      /* ---------------- HELPER FUNCTIONS ---------------- */
      function extractBeltNumber(belt) {
        if (!belt) return -1;
        const match = belt.match(/(\d+)/);
        return match ? parseInt(match[1]) : -1;
      }
      function getBeltGroup(belt) {
        if (!belt) return "Unknown";
        const beltUpper = belt.toUpperCase();
        if (beltUpper.includes("DAN")) return "Dan Grades";
        const num = extractBeltNumber(belt);
        if (num === 10 || num === 9) return "10-9 Kup";
        if (num === 8 || num === 7) return "8-7 Kup";
        if (num === 6 || num === 5) return "6-5 Kup";
        if (num === 4 || num === 3) return "4-3 Kup";
        if (num === 2 || num === 1) return "2-1 Kup";
        return belt;
      }
      function getBracketSize(count) {
        if (count <= 1) return 1;
        if (count === 2) return 2;
        if (count <= 4) return 4;
        if (count <= 8) return 8;
        if (count <= 16) return 16;
        if (count <= 32) return 32;
        return 64;
      }
      function shuffle(list) {
        const arr = [...list];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }
      function generateSeedOrder(size) {
        if (size === 1) return [0];
        const half = size / 2;
        const left = generateSeedOrder(half);
        const right = left.map((x) => x + half);
        const result = [];
        for (let i = 0; i < half; i++) {
          result.push(left[i]);
          result.push(right[i]);
        }
        return result;
      }
      function spreadTeams(list, bracketSize) {
        const slots = new Array(bracketSize).fill(null);
        const teams = {};
        list.forEach((p) => {
          if (!teams[p.team]) teams[p.team] = [];
          teams[p.team].push(p);
        });
        const sortedTeams = Object.values(teams).sort(
          (a, b) => b.length - a.length,
        );
        const positions = generateSeedOrder(bracketSize);
        let posIndex = 0;
        sortedTeams.forEach((teamArr) => {
          teamArr.forEach((player) => {
            if (posIndex < positions.length) {
              slots[positions[posIndex]] = player;
              posIndex++;
            }
          });
        });
        return slots;
      }

      async function getSavedOrder(categoryKey, type) {
        const table =
          type === "Patterns" ? "patterns_categories" : "sparring_categories";
        const { data } = await sb
          .from(table)
          .select("*")
          .eq("category", categoryKey)
          .order("position_number", { ascending: true });
        return data && data.length ? data : null;
      }

      // NEW FUNCTION: Load a saved bracket structure from the DB
      async function loadSavedBracket(categoryKey, type) {
        const { data, error } = await sb
          .from("saved_brackets")
          .select("*")
          .eq("category", categoryKey)
          .eq("bracket_type", type)
          .order("round_number", { ascending: true })
          .order("match_number", { ascending: true });

        if (error) {
          console.error("Error loading saved bracket:", error);
          return null;
        }

        if (!data || data.length === 0) {
          return null;
        }

        // Reconstruct the rounds array
        const rounds = [];
        let currentRound = -1;
        let currentMatches = [];

        data.forEach((match) => {
          if (match.round_number !== currentRound) {
            if (currentRound !== -1) {
              rounds.push(currentMatches);
            }
            currentRound = match.round_number;
            currentMatches = [];
          }
          currentMatches.push({
            p1: {
              name: match.player1_name || "",
              team: match.player1_team || "",
            },
            p2: {
              name: match.player2_name || "",
              team: match.player2_team || "",
            },
          });
        });
        if (currentMatches.length > 0) {
          rounds.push(currentMatches);
        }

        return { rounds, totalRounds: rounds.length };
      }

      // NEW FUNCTION: Save the current bracket structure to the DB
      async function saveBracketStructure(categoryKey, type) {
        const page = document.querySelector(
          `.a4-page[data-category="${CSS.escape(categoryKey)}"][data-type="${type}"]`,
        );
        if (!page) return;

        const matchesToSave = [];
        const tables = page.querySelectorAll(".bracket-table");

        tables.forEach((table, roundIndex) => {
          const rows = table.querySelectorAll("tbody tr");
          let matchNumber = 1;
          rows.forEach((row) => {
            const cells = row.querySelectorAll("td");
            cells.forEach((cell) => {
              if (cell.getAttribute("rowspan")) {
                const p1Name =
                  cell
                    .querySelector(".player-row:nth-child(1) .p-name")
                    ?.innerText.trim() || "";
                const p1Team =
                  cell
                    .querySelector(".player-row:nth-child(1) .p-team")
                    ?.innerText.trim() || "";
                const p2Name =
                  cell
                    .querySelector(".player-row:nth-child(2) .p-name")
                    ?.innerText.trim() || "";
                const p2Team =
                  cell
                    .querySelector(".player-row:nth-child(2) .p-team")
                    ?.innerText.trim() || "";

                matchesToSave.push({
                  category: categoryKey,
                  bracket_type: type,
                  round_number: roundIndex + 1,
                  match_number: matchNumber++,
                  player1_name: p1Name,
                  player1_team: p1Team,
                  player2_name: p2Name,
                  player2_team: p2Team,
                });
              }
            });
          });
        });

        // First, delete any existing bracket for this category/type
        await sb
          .from("saved_brackets")
          .delete()
          .eq("category", categoryKey)
          .eq("bracket_type", type);

        // Then, insert the new matches
        if (matchesToSave.length > 0) {
          const { error } = await sb
            .from("saved_brackets")
            .insert(matchesToSave);
          if (error) {
            console.error("Error saving bracket structure:", error);
            alert("❌ Failed to save bracket structure.");
            return false;
          }
        }

        alert("✅ Bracket structure saved successfully!");
        return true;
      }

      async function generateBracketData(list, categoryKey, type) {
        // First, try to load a saved bracket structure
        const savedBracket = await loadSavedBracket(categoryKey, type);
        if (savedBracket) {
          return savedBracket;
        }

        // If no saved bracket, generate a new one
        let useList = list;
        const savedOrder = await getSavedOrder(categoryKey, type);
        if (savedOrder && savedOrder.length > 0) {
          useList = savedOrder.map((item) => ({
            name: item.name,
            team: item.team,
            id: item.id || null,
          }));
        }
        const size = getBracketSize(useList.length);
        if (size === 1)
          return {
            rounds: [[{ p1: useList[0], p2: { name: "", team: "" } }]],
            totalRounds: 1,
          };
        if (size === 2)
          return {
            rounds: [[{ p1: useList[0], p2: useList[1] }]],
            totalRounds: 1,
          };
        const totalRounds = Math.log2(size);
        const rounds = [];
        let slots;
        if (savedOrder && savedOrder.length > 0) {
          slots = savedOrder.map((p) => ({ name: p.name, team: p.team }));
          while (slots.length < size) slots.push({ name: "BYE", team: "" });
        } else {
          const shuffled = shuffle(useList);
          slots = spreadTeams(shuffled, size);
        }
        slots = slots.map((p) =>
          !p || !p.name ? { name: "BYE", team: "" } : p,
        );
        const r1Matches = [];
        for (let i = 0; i < size; i += 2)
          r1Matches.push({ p1: slots[i], p2: slots[i + 1] });
        rounds.push(r1Matches);
        let matchCount = size / 2;
        for (let r = 1; r < totalRounds; r++) {
          matchCount = matchCount / 2;
          const currentMatches = [];
          for (let m = 0; m < matchCount; m++)
            currentMatches.push({
              p1: { name: "", team: "" },
              p2: { name: "", team: "" },
            });
          rounds.push(currentMatches);
        }
        return { rounds, totalRounds };
      }

      async function saveCategoryOrder(categoryKey, type, silent = false) {
        const table =
          type === "Patterns" ? "patterns_categories" : "sparring_categories";
        const page = document.querySelector(
          `.a4-page[data-category="${CSS.escape(categoryKey)}"][data-type="${type}"]`,
        );
        if (!page) return;
        const players = page.querySelectorAll(".match-box .player-row");
        let dataToSave = [];
        let position = 1;
        players.forEach((row) => {
          const name = row.querySelector(".p-name").innerText.trim();
          const team = row.querySelector(".p-team").innerText.trim();
          if (name && name !== "BYE" && name !== "________________") {
            dataToSave.push({
              name,
              team,
              category: categoryKey,
              position_number: position++,
            });
          }
        });
        if (dataToSave.length === 0) return;
        await sb.from(table).delete().eq("category", categoryKey);
        const { error } = await sb.from(table).insert(dataToSave);
        if (error) {
          console.error(error);
          alert("❌ Error saving.");
          return;
        }
        if (!silent) alert("✅ Order saved and position_number updated.");
      }

          .from(delTable)

          type === "Patterns" ? "patterns_categories" : "sparring_categories";

          .from(catTable)

          .from("saved_brackets")

          type === "Patterns" ? "deleted_patterns" : "deleted_sparring";
        const catTable =
          type === "Patterns" ? "patterns_categories" : "sparring_categories";
        const { data: existing } = await sb
          .from(catTable)
          .select("position_number")
          .eq("category", category)
          .order("position_number", { ascending: false })
          .limit(1);
        const nextPos =
          existing && existing[0] ? existing[0].position_number + 1 : 1;

          .from(catTable)
          .insert([{ name, team, category, position_number: nextPos }]);

          .from(delTable)
          .delete()
          .eq("name", name)
          .eq("category", category);

      function initDragAndDrop() {
        const playerRows = document.querySelectorAll(
          '.player-row[data-draggable="true"]',
        );
        playerRows.forEach((row) => {
          row.addEventListener("dragstart", handleDragStart);
          row.addEventListener("dragend", handleDragEnd);
          row.addEventListener("dragover", handleDragOver);
          row.addEventListener("dragenter", handleDragEnter);
          row.addEventListener("dragleave", handleDragLeave);
          row.addEventListener("drop", handleDrop);
        });
      }
      function handleDragStart(e) {
        e.target.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", e.target.dataset.playerId);
      }
      function handleDragEnd(e) {
        e.target.classList.remove("dragging");
        document
          .querySelectorAll(".player-row.drag-over")
          .forEach((el) => el.classList.remove("drag-over"));
      }
      function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        return false;
      }
      function handleDragEnter(e) {
        e.preventDefault();
        if (
          e.target.classList.contains("player-row") &&
          !e.target.classList.contains("dragging")
        ) {
          e.target.classList.add("drag-over");
        }
      }
      function handleDragLeave(e) {
        if (e.target.classList.contains("player-row"))
          e.target.classList.remove("drag-over");
      }
      function handleDrop(e) {
        e.preventDefault();
        e.stopPropagation();
        const draggedId = e.dataTransfer.getData("text/plain");
        const targetRow = e.target.closest(".player-row");
        if (!targetRow || targetRow.classList.contains("dragging")) return;
        targetRow.classList.remove("drag-over");
        const draggedRow = document.querySelector(
          `.player-row[data-player-id="${draggedId}"]`,
        );
        if (!draggedRow || draggedRow === targetRow) return;
        swapPlayerRows(draggedRow, targetRow);
      }
      function swapPlayerRows(row1, row2) {
        const name1 = row1.querySelector(".p-name").innerText;
        const team1 = row1.querySelector(".p-team").innerText;
        const name2 = row2.querySelector(".p-name").innerText;
        const team2 = row2.querySelector(".p-team").innerText;
        row1.querySelector(".p-name").innerText = name2;
        row2.querySelector(".p-name").innerText = name1;
        row1.querySelector(".p-team").innerText = team2;
        row2.querySelector(".p-team").innerText = team1;
        row1.style.background = "#c8e6c9";
        row2.style.background = "#c8e6c9";
        setTimeout(() => {
          row1.style.background = "";
          row2.style.background = "";
        }, 300);
      }

      /* ============================================================
         🔥🔥🔥  CORE FIX: fetchData() now merges registrations with person details
         ============================================================ */
      async function fetchData() {
        try {
          // 1. Fetch all registrations
          const { data: allRegs, error: regError } = await sb
            .from(REG_TABLE)
            .select("*");
          if (regError) throw regError;

          // 2. Separate registrations by type
          const compRegs = (allRegs || []).filter(
            (r) => r.entry_type === "comp" || r.entry_type === "competitor",
          );
          const judgeRegs = (allRegs || []).filter(
            (r) => r.entry_type === "judge",
          );
          const coachRegs = (allRegs || []).filter(
            (r) => r.entry_type === "coach",
          );

          // 3. Get unique IDs to fetch person details
          const compIds = [...new Set(compRegs.map((r) => r.entry_id))];
          const judgeIds = [...new Set(judgeRegs.map((r) => r.entry_id))];
          const coachIds = [...new Set(coachRegs.map((r) => r.entry_id))];

          let compDetails = [],
            judgeDetails = [],
            coachDetails = [];

          // 4. Fetch person details from their respective tables
          if (compIds.length > 0) {
            const { data, error } = await sb
              .from("competitors")
              .select("*")
              .in("id", compIds);
            if (!error) compDetails = data || [];
          }
          if (judgeIds.length > 0) {
            const { data, error } = await sb
              .from("judges")
              .select("*")
              .in("id", judgeIds);
            if (!error) judgeDetails = data || [];
          }
          if (coachIds.length > 0) {
            const { data, error } = await sb
              .from("coaches")
              .select("*")
              .in("id", coachIds);
            if (!error) coachDetails = data || [];
          }

          // 5. Merge registrations with details
          competitors = [];
          judges = [];
          coaches = [];

          // For competitors, create an entry for EACH event they registered for
          compDetails.forEach((person) => {
            const personRegs = compRegs.filter(
              (r) => String(r.entry_id) === String(person.id),
            );
            personRegs.forEach((reg) => {
              const entries = reg.entry_data?.entries_list || [];
              entries.forEach((entry) => {
                const parts = (entry.full_cat || "").split(" - ");
                const comp = {
                  ...person,
                  _reg_id: reg.id,
                  _discipline: entry.discipline,
                  _label: entry.label,
                  _full_cat: entry.full_cat,
                  _actual_age_group: parts[0] || "OTHER",
                  _actual_sub_cat: parts[1] || "",
                };
                competitors.push(comp);
              });
            });
          });

          judgeDetails.forEach((person) => {
            const personRegs = judgeRegs.filter(
              (r) => String(r.entry_id) === String(person.id),
            );
            personRegs.forEach((reg) => {
              judges.push({ ...person, _reg_id: reg.id });
            });
          });

          coachDetails.forEach((person) => {
            const personRegs = coachRegs.filter(
              (r) => String(r.entry_id) === String(person.id),
            );
            personRegs.forEach((reg) => {
              coaches.push({ ...person, _reg_id: reg.id });
            });
          });

          console.log(
            `Loaded ${competitors.length} competitor entries, ${judges.length} judges, ${coaches.length} coaches`,
          );
        } catch (error) {
          console.error("fetchData error:", error);
          document.getElementById("content").innerHTML =
            `<div class="empty-state">Error loading data: ${error.message || error}</div>`;
        }
      }

          gen = document.getElementById("pGen").value,
          belt = document.getElementById("pBelt").value;

        const filtered = competitors.filter((c) => {
          if (c._discipline !== "patterns") return false;

          const dbGender = (c.gender || "").trim().toUpperCase();
          const mGen =
            gen === "ALL" ||
            dbGender === gen ||
            (gen === "MALE" && (dbGender === "M" || dbGender === "MALE")) ||
            (gen === "FEMALE" && (dbGender === "F" || dbGender === "FEMALE"));

          if (!mGen) return false;
          if (age !== "ALL" && c._actual_age_group !== age) return false;
          if (belt !== "ALL" && c._actual_sub_cat !== belt) return false;

          return true;
        });

        const groups = {};
        filtered.forEach((c) => {
          const k = `${c._full_cat} - ${c.gender}`;
          if (!groups[k]) groups[k] = [];
          groups[k].push(c);
        });

        const t = document.getElementById("listTarget");
        t.innerHTML = "";
        for (const k in groups)
          t.innerHTML += createParallelCard(`Pattern: ${k}`, groups[k]);
        renderTeamSummary(filtered, "Patterns");
      }

      async function generatePatternBrackets() {
        const age = document.getElementById("pAge").value,
          gen = document.getElementById("pGen").value,
          belt = document.getElementById("pBelt").value;

        const filtered = competitors.filter((c) => {
          if (c._discipline !== "patterns") return false;
          const dbGender = (c.gender || "").trim().toUpperCase();
          const mGen =
            gen === "ALL" ||
            dbGender === gen ||
            (gen === "MALE" && (dbGender === "M" || dbGender === "MALE")) ||
            (gen === "FEMALE" && (dbGender === "F" || dbGender === "FEMALE"));

          if (!mGen) return false;
          if (age !== "ALL" && c._actual_age_group !== age) return false;
          if (belt !== "ALL" && c._actual_sub_cat !== belt) return false;

          return true;
        });

        const groups = {};
        filtered.forEach((c) => {
          const k = `${c._full_cat} - ${c.gender}`;
          if (!groups[k]) groups[k] = [];
          groups[k].push(c);
        });
        await renderBracketView(groups, "Patterns");
      }

      /* ---------------- SPARRING UI ---------------- */
      async function showSparring() {
        setActiveBtn("btnSparring");
        await fetchData();
        document.getElementById("content").innerHTML =
          `<div class="filters-card"><div class="filters">
<div class="filter-group"><label>Age Category</label><select id="sAge" onchange="updateWeightDropdown()"><option value="ALL">All Ages</option><option value="KIDS">Kids (6-9)</option><option value="YOUTH">Youth (10-11)</option><option value="OLDER_YOUTH">Older Youth (12-13)</option><option value="JUNIORS">Juniors (14-16)</option><option value="OTHER">Other</option></select></div>
<div class="filter-group"><label>Gender</label><select id="sGen" onchange="updateWeightDropdown()"><option value="ALL">All</option><option value="MALE">Male</option><option value="FEMALE">Female</option></select></div>
<div class="filter-group"><label>Weight Class</label><select id="sWeight" onchange="runSparringFilter()"><option value="ALL">All</option></select></div>
<div class="filter-group" style="flex:0"><label style="visibility:hidden">Action</label><button class="btn btn-success" onclick="generateSparringBrackets()"><i class="fas fa-trophy"></i> View Brackets</button></div>
</div><div id="sparringInfo" class="info-banner"><i class="fas fa-info-circle"></i> Select Age and Gender to see round times.</div></div><div id="listTarget"></div><div id="teamSummary" class="team-summary-box"></div>`;
        updateWeightDropdown();
      }

      function updateWeightDropdown() {
        const age = document.getElementById("sAge").value,
          gen = document.getElementById("sGen").value,
          wDrop = document.getElementById("sWeight"),
          info = document.getElementById("sparringInfo");
        wDrop.innerHTML = '<option value="ALL">All</option>';

        const relevantComps = competitors.filter((c) => {
          if (c._discipline !== "sparring") return false;
          if (age !== "ALL" && c._actual_age_group !== age) return false;
          const dbGender = (c.gender || "").trim().toUpperCase();
          const mGen =
            gen === "ALL" ||
            dbGender === gen ||
            (gen === "MALE" && (dbGender === "M" || dbGender === "MALE")) ||
            (gen === "FEMALE" && (dbGender === "F" || dbGender === "FEMALE"));
          return mGen;
        });

        const weights = new Set();
        relevantComps.forEach((c) => {
          const w = c._actual_sub_cat.replace("kg", "");
          if (w && w !== "N/A") weights.add(w);
        });

        Array.from(weights)
          .sort((a, b) => {
            const numA = parseFloat(a.replace(/[^0-9.-]/g, ""));
            const numB = parseFloat(b.replace(/[^0-9.-]/g, ""));
            if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
            return a.localeCompare(b);
          })
          .forEach((w) => {
            wDrop.innerHTML += `<option value="${w}">${w}kg</option>`;
          });

        if (
          age !== "ALL" &&
          gen !== "ALL" &&
          age !== "OTHER" &&
          RULES.SPARRING[age]
        ) {
          info.innerHTML = `<i class="far fa-clock"></i> Match Time: ${RULES.SPARRING[age].time}`;
        } else {
          info.innerHTML = `<i class="fas fa-info-circle"></i> Select Age and Gender to see round times.`;
        }

        runSparringFilter();
      }

      function runSparringFilter() {
        const age = document.getElementById("sAge").value,
          gen = document.getElementById("sGen").value,
          weightReq = document.getElementById("sWeight").value;

        const filtered = competitors.filter((c) => {
          if (c._discipline !== "sparring") return false;

          if (age !== "ALL" && c._actual_age_group !== age) return false;

          const dbGender = (c.gender || "").trim().toUpperCase();
          const mGen =
            gen === "ALL" ||
            dbGender === gen ||
            (gen === "MALE" && (dbGender === "M" || dbGender === "MALE")) ||
            (gen === "FEMALE" && (dbGender === "F" || dbGender === "FEMALE"));
          if (!mGen) return false;

          const cWeight = c._actual_sub_cat.replace("kg", "");
          if (weightReq !== "ALL" && cWeight !== weightReq) return false;

          return true;
        });

        const groups = {};
        filtered.forEach((c) => {
          const k = `${c._full_cat} - ${c.gender}`;
          if (!groups[k]) groups[k] = [];
          groups[k].push(c);
        });

        const t = document.getElementById("listTarget");
        t.innerHTML = "";
        for (const k in groups)
          t.innerHTML += createParallelCard(`Sparring: ${k}`, groups[k]);
        renderTeamSummary(filtered, "Sparring");
      }

      async function generateSparringBrackets() {
        const age = document.getElementById("sAge").value,
          gen = document.getElementById("sGen").value,
          weightReq = document.getElementById("sWeight").value;

        const filtered = competitors.filter((c) => {
          if (c._discipline !== "sparring") return false;
          if (age !== "ALL" && c._actual_age_group !== age) return false;
          const dbGender = (c.gender || "").trim().toUpperCase();
          const mGen =
            gen === "ALL" ||
            dbGender === gen ||
            (gen === "MALE" && (dbGender === "M" || dbGender === "MALE")) ||
            (gen === "FEMALE" && (dbGender === "F" || dbGender === "FEMALE"));
          if (!mGen) return false;
          const cWeight = c._actual_sub_cat.replace("kg", "");
          if (weightReq !== "ALL" && cWeight !== weightReq) return false;
          return true;
        });

        const groups = {};
        filtered.forEach((c) => {
          const k = `${c._full_cat} - ${c.gender}`;
          if (!groups[k]) groups[k] = [];
          groups[k].push(c);
        });
        await renderBracketView(groups, "Sparring");
      }

      /* ---------------- UTILS ---------------- */
      function createParallelCard(title, list) {
        if (list.length === 0)
          return `<div class="empty-state">No competitors found.</div>`;
        let n = "",
          t = "";
        list.forEach((c) => {
          n += `<div class="row-item">${c.name}</div>`;
          t += `<div class="row-item">${c.team || "N/A"}</div>`;
        });
        return `<div class="category-card"><div class="category-header">${title} <span class="category-count">${list.length}</span></div><div class="parallel-container"><div class="col-list"><div class="col-header"><i class="fas fa-user"></i> Competitors</div>${n}</div><div class="col-list"><div class="col-header"><i class="fas fa-users"></i> Teams</div>${t}</div></div></div>`;
      }

      function renderTeamSummary(list, type) {
        const s = {};
        let total = 0;
        list.forEach((c) => {
          const teamName = c.team || "Unassigned";
          s[teamName] = (s[teamName] || 0) + 1;
          total++;
        });
        let h = `<h3 style="color:var(--primary);margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:5px">Team Summary (${type})</h3><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">`;
        const k = Object.keys(s).sort();
        if (!k.length) {
          h += `<span style="color:var(--gray);grid-column:1/-1">No data.</span>`;
        } else {
          k.forEach(
            (t) =>
              (h += `<div style="background:#f8f9fa;padding:8px;border-radius:4px;border-left:3px solid var(--secondary)"><strong style="display:block">${t}</strong><span style="font-size:0.85rem;color:var(--gray)">${s[t]} members</span></div>`),
          );
        }
        h += `</div><div style="margin-top:15px;padding:10px;background:var(--primary);color:white;border-radius:6px;font-weight:bold;text-align:center">Total: ${total}</div>`;
        document.getElementById("teamSummary").innerHTML = h;
      }

      async function showJudges() {
        setActiveBtn("btnJudges");
        await fetchData();
        const g = {};
        judges.forEach(
          (j) =>
            (g[j.team || "Unassigned"] = (g[j.team || "Unassigned"] || 0) + 1),
        );
        let h = `<div class="category-card"><div class="category-header">Judges List</div><table style="width:100%;border-collapse:collapse"><tr><th style="padding:10px;background:var(--light-gray)">Name</th><th style="padding:10px;background:var(--light-gray)">Belt</th><th style="padding:10px;background:var(--light-gray)">Team</th></tr>`;
        judges.forEach(
          (j) =>
            (h += `<tr><td style="padding:8px;border-bottom:1px solid #eee">${j.name}</td><td style="padding:8px;border-bottom:1px solid #eee">${j.belt}</td><td style="padding:8px;border-bottom:1px solid #eee">${j.team || "N/A"}</td></tr>`),
        );
        h += `</table></div><div class="team-summary-box"><h3>Teams Registered</h3><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:10px">`;
        Object.keys(g)
          .sort()
          .forEach(
            (t) =>
              (h += `<div style="background:#f8f9fa;padding:10px;border-radius:4px"><strong>${t}</strong>: ${g[t]} judges</div>`),
          );
        document.getElementById("content").innerHTML = h + `</div></div>`;
      }

      async function showCoaches() {
        setActiveBtn("btnCoaches");
        await fetchData();
        const g = {};
        coaches.forEach(
          (c) =>
            (g[c.team || "Unassigned"] = (g[c.team || "Unassigned"] || 0) + 1),
        );
        let h = `<div class="category-card"><div class="category-header">Coaches List</div><table style="width:100%;border-collapse:collapse"><tr><th style="padding:10px;background:var(--light-gray)">Name</th><th style="padding:10px;background:var(--light-gray)">Belt</th><th style="padding:10px;background:var(--light-gray)">Team</th></tr>`;
        coaches.forEach(
          (c) =>
            (h += `<tr><td style="padding:8px;border-bottom:1px solid #eee">${c.name}</td><td style="padding:8px;border-bottom:1px solid #eee">${c.belt}</td><td style="padding:8px;border-bottom:1px solid #eee">${c.team || "N/A"}</td></tr>`),
        );
        h += `</table></div><div class="team-summary-box"><h3>Teams Registered</h3><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:10px">`;
        Object.keys(g)
          .sort()
          .forEach(
            (t) =>
              (h += `<div style="background:#f8f9fa;padding:10px;border-radius:4px"><strong>${t}</strong>: ${g[t]} coaches</div>`),
          );
        document.getElementById("content").innerHTML = h + `</div></div>`;
      }

      const today = new Date();
      document.getElementById("tournamentDate").valueAsDate = today;
      tournamentDate = today.toISOString().split("T")[0];
      showPatterns();
    </script>
