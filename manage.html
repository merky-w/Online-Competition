<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tournament Manager - 9-th Vojvodina Open ITF</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #1a3a6c;
        --primary-dark: #0d2a52;
        --secondary: #d4af37;
        --light: #f8f9fa;
        --dark: #212529;
        --success: #28a745;
        --danger: #dc3545;
        --warning: #ffc107;
        --gray: #6c757d;
        --light-gray: #e9ecef;
        --border: #dee2e6;
        --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        --transition: all 0.3s ease;
        --price-patterns: #1565c0;
        --price-sparring: #c2185b;
        --price-total: #e65100;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f5f7fa;
        color: var(--dark);
        line-height: 1.6;
        padding: 20px;
      }
      .container { max-width: 1200px; margin: 0 auto; }
      header {
        text-align: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 2px solid var(--secondary);
      }
      h1 { font-size: 2rem; color: var(--primary); margin-bottom: 5px; font-weight: 700; }
      .subtitle { color: var(--gray); font-size: 1rem; }
      .nav {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.95rem;
      }
      .btn-sm { padding: 5px 12px; font-size: 0.85rem; }
      .btn-xs { padding: 2px 6px; font-size: 0.75rem; }
      .btn-primary { background: var(--primary); color: white; }
      .btn-primary:hover { background: var(--primary-dark); }
      .btn-secondary { background: var(--light-gray); color: var(--dark); }
      .btn-secondary:hover { background: #dcdcdc; }
      .btn-success { background: var(--success); color: white; }
      .btn-danger { background: var(--danger); color: white; }
      .btn-warning { background: var(--warning); color: #212529; }
      .btn-warning:hover { background: #e0a800; }
      .btn-info { background: #17a2b8; color: white; }
      .btn-info:hover { background: #138496; }
      .btn-undo { background: #6f42c1; color: white; }
      .btn-undo:hover { background: #5a32a3; }
      .btn-undo:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; }
      .btn-add { background: var(--success); color: white; }
      .btn-add:hover { background: #218838; }
      .btn-remove { background: #fd7e14; color: white; }
      .btn-remove:hover { background: #e36c09; }
      .btn-active {
        background: var(--secondary);
        color: #fff;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
      }
      .filters-card {
        background: white;
        border-radius: 12px;
        box-shadow: var(--shadow);
        padding: 20px;
        margin-bottom: 20px;
        border-left: 5px solid var(--secondary);
      }
      .filters { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
      .filter-group { flex: 1; min-width: 150px; }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: var(--gray);
        font-size: 0.85rem;
      }
      select, input[type="date"], input[type="text"], input[type="number"] {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 0.95rem;
        outline: none;
        transition: var(--transition);
        font-family: inherit;
      }
      .info-banner {
        background: #e7f3ff;
        color: var(--primary);
        padding: 12px;
        border-radius: 6px;
        margin-top: 15px;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .category-card {
        background: white;
        border-radius: 12px;
        box-shadow: var(--shadow);
        margin-bottom: 25px;
        overflow: hidden;
        border-top: 4px solid var(--primary);
      }
      .category-header {
        background: var(--primary);
        color: white;
        padding: 12px 20px;
        font-size: 1.1rem;
        font-weight: 700;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .parallel-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        border-bottom: 1px solid var(--border);
      }
      .col-header {
        background: var(--light-gray);
        padding: 10px;
        text-align: center;
        font-weight: 700;
        color: var(--primary);
        border-bottom: 2px solid var(--border);
        text-transform: uppercase;
        font-size: 0.85rem;
      }
      .row-item {
        padding: 10px 15px;
        border-bottom: 1px dashed #e0e0e0;
        font-size: 0.95rem;
        color: var(--dark);
        display: flex;
        align-items: center;
      }
      .row-item:last-child { border-bottom: none; }
      .col-list:nth-child(2) .row-item { background-color: #fafafa; }
      .col-list:nth-child(2) .row-item:hover { background-color: #f0f0f0; }
      .a4-page {
        background: white;
        width: 210mm;
        min-height: 297mm;
        margin: 20px auto;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        padding: 15mm;
        display: flex;
        flex-direction: column;
        page-break-after: always;
      }
      .bracket-header {
        text-align: center;
        border-bottom: 2px solid var(--secondary);
        padding-bottom: 10px;
        margin-bottom: 10px;
      }
      .bracket-header h2 { color: var(--primary); margin: 0; text-transform: uppercase; }
      .bracket-table { width: 100%; border-collapse: collapse; flex: 1; table-layout: fixed; }
      .bracket-table tbody { height: 100%; }
      .bracket-table th {
        background-color: var(--light-gray);
        color: var(--primary);
        padding: 8px;
        font-size: 0.9rem;
        border: 1px solid var(--border);
        text-align: center;
        width: 1%;
      }
      .bracket-table td { border: 1px solid var(--border); padding: 0; vertical-align: middle; }
      .bracket-table tbody tr { height: calc(100% / var(--row-count)); }
      .match-cell {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        padding: 2px;
      }
      .match-box {
        background: #fff;
        border: 1px solid #ccc;
        border-left: 3px solid var(--primary);
        padding: 4px 8px;
        font-size: 0.85rem;
        border-radius: 4px;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow: hidden;
      }
      .match-box.bye { background: #f9f9f9; border-left: 3px solid #ccc; color: #999; font-style: italic; }
      .match-box.empty { background: #fcfcfc; border-left: 3px dashed #bbb; border: 1px dashed #ddd; }
      .p-name:empty::before { content: "________________"; color: #ccc; display: block; white-space: pre; }
      .p-name:empty:focus::before { content: ""; }
      .p-name { min-width: 80px; min-height: 1.2em; display: inline-block; outline: none; cursor: text; }
      .p-name:focus { background-color: #fffbe6; border-radius: 2px; }
      .player-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2px;
        padding: 2px 4px;
        border-radius: 4px;
        transition: background 0.2s;
        gap: 4px;
        cursor: grab;
      }
      .player-row:active { cursor: grabbing; }
      .player-row.dragging { opacity: 0.6; background: #ffe082 !important; transform: scale(1.02); }
      .player-row.drag-over { background: #c8e6c9 !important; border: 2px dashed var(--success); }
      .player-row .player-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
      .p-name { font-weight: 600; }
      .p-team { font-size: 0.75rem; color: #666; }
      .delete-btn {
        background: var(--danger);
        color: white;
        border: none;
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 0.7rem;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .player-row:hover .delete-btn { opacity: 1; }
      .vs-divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 4px 0;
        font-size: 10px;
        color: #999;
        font-weight: 700;
      }
      .vs-divider::before, .vs-divider::after { content: ""; flex: 1; border-bottom: 1px solid #ccc; }
      .vs-divider:not(:empty)::before { margin-right: 6px; }
      .vs-divider:not(:empty)::after { margin-left: 6px; }
      .controls {
        text-align: center;
        margin-bottom: 20px;
        padding: 15px;
        background: white;
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      /* ===== NEW: Bracket Controls Bar ===== */
      .bracket-controls-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 15px;
        padding: 12px 15px;
        background: white;
        border-radius: 8px;
        box-shadow: var(--shadow);
        border-left: 4px solid var(--secondary);
      }
      .bracket-controls-left {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .bracket-controls-right {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      /* ===== NEW: Search Box ===== */
      .search-box {
        position: relative;
        display: flex;
        align-items: center;
        background: white;
        border: 2px solid var(--border);
        border-radius: 20px;
        padding: 4px 12px;
        transition: var(--transition);
        min-width: 220px;
      }
      .search-box:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(26, 58, 108, 0.15);
      }
      .search-box i {
        color: var(--gray);
        margin-right: 8px;
      }
      .search-box input {
        border: none;
        outline: none;
        padding: 6px 4px;
        font-size: 0.9rem;
        flex: 1;
        background: transparent;
        min-width: 150px;
      }
      .search-clear {
        background: none;
        border: none;
        color: var(--gray);
        cursor: pointer;
        padding: 2px 6px;
        font-size: 0.85rem;
        display: none;
      }
      .search-clear.visible { display: inline-block; }
      .search-clear:hover { color: var(--danger); }
      .search-count {
        font-size: 0.75rem;
        color: var(--gray);
        font-weight: 600;
        padding: 2px 8px;
        background: var(--light-gray);
        border-radius: 10px;
        margin-left: 6px;
        display: none;
      }
      .search-count.visible { display: inline-block; }

      /* ===== NEW: Highlight for search ===== */
      .search-highlight {
        background: #fff176 !important;
        box-shadow: 0 0 0 2px #fbc02d;
        border-radius: 3px;
        animation: pulseHighlight 1.5s ease-in-out infinite;
      }
      .search-match-row {
        background: #fff9c4 !important;
        border-left: 3px solid #fbc02d !important;
      }
      @keyframes pulseHighlight {
        0%, 100% { box-shadow: 0 0 0 2px #fbc02d; }
        50% { box-shadow: 0 0 0 4px #fbc02d, 0 0 8px rgba(251, 192, 45, 0.5); }
      }

      /* ===== NEW: Undo badge ===== */
      .undo-badge {
        background: rgba(255,255,255,0.25);
        color: white;
        padding: 1px 7px;
        border-radius: 10px;
        font-size: 0.7rem;
        font-weight: 700;
        margin-left: 4px;
      }

      /* ===== NEW: Bracket +/- buttons on header ===== */
      .bracket-header-actions {
        display: flex;
        gap: 6px;
        justify-content: flex-end;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .bracket-header-actions .btn {
        font-size: 0.8rem;
        padding: 4px 10px;
      }

      /* ===== NEW: Add Player Modal ===== */
      .mini-modal-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        backdrop-filter: blur(3px);
      }
      .mini-modal {
        background: white;
        border-radius: 12px;
        padding: 25px;
        width: 90%;
        max-width: 400px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      }
      .mini-modal h3 {
        color: var(--primary);
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .mini-modal .form-group {
        margin-bottom: 12px;
      }
      .mini-modal .form-group label {
        color: var(--dark);
        font-size: 0.85rem;
        margin-bottom: 4px;
      }
      .mini-modal .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 15px;
      }

      .deleted-card {
        background: white;
        border-radius: 12px;
        box-shadow: var(--shadow);
        margin-bottom: 15px;
        padding: 12px 15px;
        border-left: 4px solid var(--danger);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .deleted-info { flex: 1; }
      .deleted-info strong { display: block; color: var(--primary); }
      .deleted-info small { color: var(--gray); }
      .deleted-actions { display: flex; gap: 5px; }

      .team-overview-card {
        background: white;
        border-radius: 12px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
        overflow: hidden;
        border-left: 5px solid var(--primary);
        transition: var(--transition);
      }
      .team-overview-card:hover {
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        transform: translateY(-2px);
      }
      .team-overview-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 22px;
        background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 12px;
      }
      .team-name-block {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        min-width: 200px;
      }
      .team-icon {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--primary);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1.1rem;
        flex-shrink: 0;
      }
      .team-name {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--primary);
      }
      .team-stats {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        align-items: center;
      }
      .stat-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
        background: var(--light-gray);
        color: var(--dark);
      }
      .stat-pill.patterns { background: #e3f2fd; color: #1565c0; }
      .stat-pill.sparring { background: #fce4ec; color: #c2185b; }
      .stat-pill.total { background: #fff3e0; color: #e65100; }
      .stat-pill.entries { background: #f3e5f5; color: #6a1b9a; }
      .stat-pill .stat-num {
        background: white;
        padding: 2px 8px;
        border-radius: 12px;
        font-weight: 700;
        box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      }
      .team-actions {
        display: flex;
        gap: 8px;
        padding: 12px 22px;
        background: #fafafa;
        border-top: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .team-price-summary {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px 22px;
        background: linear-gradient(90deg, #fffde7 0%, #fff8e1 50%, #fffde7 100%);
        border-top: 1px dashed #ffe082;
        border-bottom: 1px dashed #ffe082;
        flex-wrap: wrap;
        font-weight: 600;
      }
      .price-segment {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.9rem;
        font-weight: 700;
      }
      .price-segment.patterns-price {
        background: #e3f2fd;
        color: var(--price-patterns);
        border: 1px solid #90caf9;
      }
      .price-segment.sparring-price {
        background: #fce4ec;
        color: var(--price-sparring);
        border: 1px solid #f48fb1;
      }
      .price-segment.total-price {
        background: linear-gradient(135deg, #ff8a65 0%, #ff6e40 100%);
        color: white;
        border: 1px solid #e64a19;
        font-size: 1rem;
        padding: 6px 18px;
        box-shadow: 0 2px 6px rgba(230, 74, 25, 0.3);
      }
      .price-operator {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--gray);
      }
      .price-unavailable {
        padding: 10px 22px;
        background: #fff3cd;
        color: #856404;
        font-size: 0.85rem;
        text-align: center;
        border-top: 1px dashed #ffe082;
        font-style: italic;
      }

      .team-detail-modal {
        background: white;
        border-radius: 12px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
        overflow: hidden;
      }
      .team-detail-header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        color: white;
        padding: 18px 22px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }
      .team-detail-header.patterns-header {
        background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
      }
      .team-detail-header.sparring-header {
        background: linear-gradient(135deg, #c2185b 0%, #880e4f 100%);
      }
      .team-detail-header h3 {
        margin: 0;
        font-size: 1.3rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .competitor-detail-card {
        background: white;
        border: 1px solid var(--border);
        border-radius: 8px;
        margin: 12px 22px;
        overflow: hidden;
        transition: var(--transition);
      }
      .competitor-detail-card:hover {
        border-color: var(--secondary);
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      }
      .competitor-detail-header {
        padding: 10px 15px;
        background: #f8f9fa;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .competitor-detail-name {
        font-weight: 700;
        color: var(--primary);
        font-size: 1rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .category-count-badge {
        background: var(--secondary);
        color: white;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 700;
      }
      .category-list {
        padding: 10px 15px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .category-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 600;
        background: #e8eaf6;
        color: #283593;
        border-left: 3px solid var(--primary);
      }
      .category-tag.sparring-tag {
        background: #fce4ec;
        color: #880e4f;
        border-left-color: #c2185b;
      }
      .category-tag.patterns-tag {
        background: #e3f2fd;
        color: #0d47a1;
        border-left-color: #1565c0;
      }
      .empty-team-detail {
        padding: 30px;
        text-align: center;
        color: var(--gray);
        font-style: italic;
      }

      .debug-box {
        background: #fff3cd;
        border: 1px solid #ffc107;
        border-radius: 6px;
        padding: 10px;
        margin: 10px 0;
        font-family: monospace;
        font-size: 0.8rem;
        max-height: 200px;
        overflow: auto;
        white-space: pre-wrap;
      }

      @media print {
        @page { size: A4; margin: 10mm; }
        body { margin: 0; padding: 0; background: white; -webkit-print-color-adjust: exact; }
        * { box-sizing: border-box; }
        .nav, .filters-card, .controls, .subtitle, .debug-box, .bracket-controls-bar, .bracket-header-actions, .search-box { display: none !important; }
        .container { max-width: none; width: 100%; margin: 0; padding: 0; }
        .a4-page { margin: 0; box-shadow: none; page-break-after: always; display: flex; flex-direction: column; }
        .p-name:empty::before { color: #999; border-bottom: 1px solid #000; content: ""; display: block; height: 1em; }
      }
      @media (max-width: 768px) {
        .parallel-container { grid-template-columns: 1fr; border-bottom: none; }
        .col-list:nth-child(2) { border-top: 2px solid var(--border); }
        .a4-page { width: 100%; min-height: auto; padding: 10px; margin-bottom: 20px; }
        .team-overview-header { flex-direction: column; align-items: flex-start; }
        .team-stats { width: 100%; }
        .bracket-controls-bar { flex-direction: column; align-items: stretch; }
        .bracket-controls-right { justify-content: center; }
        .search-box { min-width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="container">

      /* ============================================================
         🆕 UNDO STACK — tracks all bracket actions for undo
         ============================================================ */
      let undoStack = []; // { type, category, bracketType, description, reverse: async fn }

      function pushUndo(action) {
        undoStack.push(action);
        updateUndoButton();
        // Save to DB (fire-and-forget)
        sb.from("undo_history").insert([{
          category: action.category,
          bracket_type: action.bracketType,
          action_type: action.type,
          description: action.description,
          before_state: action.beforeState || null,
          after_state: action.afterState || null,
        }]).then(({ error }) => {
          if (error) console.warn("Undo history save failed:", error.message);
        });
      }

      function updateUndoButton() {
        const btn = document.getElementById("undoBtn");
        if (!btn) return;
        const count = undoStack.length;
        btn.disabled = count === 0;
        const badge = btn.querySelector(".undo-badge");
        if (badge) badge.textContent = count;
      }

      async function performUndo() {
        if (undoStack.length === 0) return;
        const action = undoStack.pop();
        console.log("🔙 Undoing:", action.description);
        try {
          await action.reverse();
          // Mark as undone in DB
          sb.from("undo_history")
            .update({ undone: true })
            .eq("category", action.category)
            .eq("bracket_type", action.bracketType)
            .eq("action_type", action.type)
            .order("created_at", { ascending: false })
            .limit(1);
          updateUndoButton();
          // Re-render the bracket view to reflect changes
          if (currentGroups && currentBracketType) {
            await renderBracketView(currentGroups, currentBracketType);
          }
          alert(`✅ Undone: ${action.description}`);
        } catch (err) {
          console.error("Undo failed:", err);
          alert("❌ Undo failed: " + err.message);
        }
      }

      function extractBeltNumber(belt) {
        if (!belt) return -1;
        const match = belt.match(/(\d+)/);
        return match ? parseInt(match[1]) : -1;
      }
      function getBeltGroup(belt) {
        if (!belt) return "Unknown";
        const beltUpper = belt.toUpperCase();
        if (beltUpper.includes("DAN")) return "Dan Grades";
        const num = extractBeltNumber(belt);
        if (num === 10 || num === 9) return "10-9 Kup";
        if (num === 8 || num === 7) return "8-7 Kup";
        if (num === 6 || num === 5) return "6-5 Kup";
        if (num === 4 || num === 3) return "4-3 Kup";
        if (num === 2 || num === 1) return "2-1 Kup";
        return belt;
      }
      function getBracketSize(count) {
        if (count <= 1) return 1;
        if (count === 2) return 2;
        if (count <= 4) return 4;
        if (count <= 8) return 8;
        if (count <= 16) return 16;
        if (count <= 32) return 32;
        return 64;
      }
      function shuffle(list) {
        const arr = [...list];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }
      function generateSeedOrder(size) {
        if (size === 1) return [0];
        const half = size / 2;
        const left = generateSeedOrder(half);
        const right = left.map((x) => x + half);
        const result = [];
        for (let i = 0; i < half; i++) {
          result.push(left[i]);
          result.push(right[i]);
        }
        return result;
      }
      function spreadTeams(list, bracketSize) {
        const slots = new Array(bracketSize).fill(null);
        const teams = {};
        list.forEach((p) => {
          if (!teams[p.team]) teams[p.team] = [];
          teams[p.team].push(p);
        });
        const sortedTeams = Object.values(teams).sort((a, b) => b.length - a.length);
        const positions = generateSeedOrder(bracketSize);
        let posIndex = 0;
        sortedTeams.forEach((teamArr) => {
          teamArr.forEach((player) => {
            if (posIndex < positions.length) {
              slots[positions[posIndex]] = player;
              posIndex++;
            }
          });
        });
        return slots;
      }

      async function getSavedOrder(categoryKey, type) {
        const table = type === "Patterns" ? "patterns_categories" : "sparring_categories";
        const { data, error } = await sb.from(table).select("*").eq("category", categoryKey).order("position_number", { ascending: true });

      async function loadSavedBracket(categoryKey, type) {
        const { data, error } = await sb.from("saved_brackets").select("*").eq("category", categoryKey).eq("bracket_type", type).order("round_number", { ascending: true }).order("match_number", { ascending: true });
        if (error) { console.error("Error loading saved bracket:", error); return null; }
        if (!data || data.length === 0) return null;
        const rounds = [];
        let currentRound = -1;
        let currentMatches = [];
        data.forEach((match) => {
          if (match.round_number !== currentRound) {
            if (currentRound !== -1) rounds.push(currentMatches);
            currentRound = match.round_number;
            currentMatches = [];
          }
          currentMatches.push({
            p1: { name: match.player1_name || "", team: match.player1_team || "" },
            p2: { name: match.player2_name || "", team: match.player2_team || "" },
          });
        });
        if (currentMatches.length > 0) rounds.push(currentMatches);
        return { rounds, totalRounds: rounds.length };
      }

      async function saveBracketStructure(categoryKey, type) {
        const page = document.querySelector(`.a4-page[data-category="${CSS.escape(categoryKey)}"][data-type="${type}"]`);
        if (!page) { alert("❌ Page not found for category: " + categoryKey); return false; }
        const matchesToSave = [];
        const tables = page.querySelectorAll(".bracket-table");
        tables.forEach((table, roundIndex) => {
          const rows = table.querySelectorAll("tbody tr");
          let matchNumber = 1;
          rows.forEach((row) => {
            const cells = row.querySelectorAll("td");
            cells.forEach((cell) => {
              if (cell.getAttribute("rowspan")) {
                const p1Name = cell.querySelector(".player-row:nth-child(1) .p-name")?.innerText.trim() || "";
                const p1Team = cell.querySelector(".player-row:nth-child(1) .p-team")?.innerText.trim() || "";
                const p2Name = cell.querySelector(".player-row:nth-child(2) .p-name")?.innerText.trim() || "";
                const p2Team = cell.querySelector(".player-row:nth-child(2) .p-team")?.innerText.trim() || "";
                matchesToSave.push({
                  category: categoryKey, bracket_type: type, round_number: roundIndex + 1, match_number: matchNumber++,
                  player1_name: p1Name, player1_team: p1Team, player2_name: p2Name, player2_team: p2Team,
                });
              }
            });
          });
        });
        const { error: delError } = await sb.from("saved_brackets").delete().eq("category", categoryKey).eq("bracket_type", type);
        if (delError) { alert("❌ Failed to delete old bracket: " + delError.message); return false; }
        if (matchesToSave.length > 0) {
          const { error: insError } = await sb.from("saved_brackets").insert(matchesToSave);
          if (insError) { alert("❌ Failed to save bracket structure: " + insError.message); return false; }
        }
        alert("✅ Bracket structure saved successfully! (" + matchesToSave.length + " matches)");
        return true;
      }

      async function generateBracketData(list, categoryKey, type) {
        const savedBracket = await loadSavedBracket(categoryKey, type);
        if (savedBracket) return savedBracket;
        let useList = list;
        const savedOrder = await getSavedOrder(categoryKey, type);
        if (savedOrder && savedOrder.length > 0) {
          useList = savedOrder.map((item) => ({ name: item.name, team: item.team, id: item.id || null }));
        }
        const size = getBracketSize(useList.length);
        if (size === 1) return { rounds: [[{ p1: useList[0] || {name:"",team:""}, p2: { name: "", team: "" } }]], totalRounds: 1 };
        if (size === 2) return { rounds: [[{ p1: useList[0] || {name:"",team:""}, p2: useList[1] || {name:"",team:""} }]], totalRounds: 1 };
        const totalRounds = Math.log2(size);
        const rounds = [];
        let slots;
        if (savedOrder && savedOrder.length > 0) {
          slots = savedOrder.map((p) => ({ name: p.name, team: p.team }));
          while (slots.length < size) slots.push({ name: "BYE", team: "" });
        } else {
          const shuffled = shuffle(useList);
          slots = spreadTeams(shuffled, size);
        }
        slots = slots.map((p) => !p || !p.name ? { name: "BYE", team: "" } : p);
        const r1Matches = [];
        for (let i = 0; i < size; i += 2) r1Matches.push({ p1: slots[i], p2: slots[i + 1] });
        rounds.push(r1Matches);
        let matchCount = size / 2;
        for (let r = 1; r < totalRounds; r++) {
          matchCount = matchCount / 2;
          const currentMatches = [];
          for (let m = 0; m < matchCount; m++) currentMatches.push({ p1: { name: "", team: "" }, p2: { name: "", team: "" } });
          rounds.push(currentMatches);
        }
        return { rounds, totalRounds };
      }

      async function saveCategoryOrder(categoryKey, type, silent = false) {
        const table = type === "Patterns" ? "patterns_categories" : "sparring_categories";
        const page = document.querySelector(`.a4-page[data-category="${CSS.escape(categoryKey)}"][data-type="${type}"]`);
        if (!page) { if (!silent) alert("❌ Page not found for category: " + categoryKey); return; }
        const firstTable = page.querySelector(".bracket-table");
        if (!firstTable) { if (!silent) alert("❌ No bracket table found."); return; }
        const dataToSave = [];
        let position = 1;
        const firstRoundCells = firstTable.querySelectorAll("tbody tr td:first-child");
        const seenPlayers = new Set();
        firstRoundCells.forEach((cell) => {
          const playerRows = cell.querySelectorAll(".player-row");
          playerRows.forEach((row) => {
            const nameEl = row.querySelector(".p-name");
            const teamEl = row.querySelector(".p-team");
            if (!nameEl) return;
            const name = nameEl.innerText.trim();
            const team = teamEl ? teamEl.innerText.trim() : "";
            if (!name || name === "BYE" || name === "________________") return;
            const key = name + "|" + team;
            if (seenPlayers.has(key)) return;
            seenPlayers.add(key);
            dataToSave.push({ name, team, category: categoryKey, position_number: position++ });
          });
        });
        if (dataToSave.length === 0) { if (!silent) alert("⚠️ No players to save for " + categoryKey); return; }
        const { error: delError } = await sb.from(table).delete().eq("category", categoryKey);
        if (delError) { alert("❌ Error deleting old order: " + delError.message); return; }
        const { error: insError } = await sb.from(table).insert(dataToSave);
        if (insError) { alert("❌ Error saving order: " + insError.message); return; }
        if (!silent) alert("✅ Order saved! " + dataToSave.length + " players in " + categoryKey);
      }

      async function deletePlayerFromBracket(name, team, category, type) {
        if (!confirm(`Delete "${name}" from ${category}?`)) return;
        const delTable = type === "Patterns" ? "deleted_patterns" : "deleted_sparring";
        const { error: insErr } = await sb.from(delTable).insert([{ name, team, category, type, deleted_at: new Date().toISOString() }]);
        if (insErr) { alert("❌ Error: " + insErr.message); return; }
        const catTable = type === "Patterns" ? "patterns_categories" : "sparring_categories";
        await sb.from(catTable).delete().eq("category", category).eq("name", name);
        await sb.from("saved_brackets").delete().eq("category", category).eq("bracket_type", type);

        // 🆕 Push undo action
        pushUndo({
          type: "delete_player",
          category,
          bracketType: type,
          description: `Delete "${name}" from ${category}`,
          beforeState: { name, team, category, type },
          afterState: null,
          reverse: async () => {
            // Remove from deleted table
            await sb.from(delTable).delete().eq("name", name).eq("category", category);
            // Re-add to category table
            const { data: existing } = await sb.from(catTable).select("position_number").eq("category", category).order("position_number", { ascending: false }).limit(1);
            const nextPos = existing && existing[0] ? existing[0].position_number + 1 : 1;
            await sb.from(catTable).insert([{ name, team, category, position_number: nextPos }]);
            await sb.from("saved_brackets").delete().eq("category", category).eq("bracket_type", type);
            if (currentGroups && currentGroups[category]) {
              currentGroups[category].push({ name, team });
            }
          }
        });

        const page = document.querySelector(`.a4-page[data-category="${CSS.escape(category)}"][data-type="${type}"]`);
        if (page) {
          const playerRows = page.querySelectorAll(".player-row");
          playerRows.forEach((row) => {
            const pName = row.querySelector(".p-name").innerText.trim();
            if (pName === name) { row.querySelector(".p-name").innerText = ""; row.querySelector(".p-team").innerText = ""; }
          });
        }
        // Update currentGroups
        if (currentGroups && currentGroups[category]) {
          const idx = currentGroups[category].findIndex(c => c.name === name);
          if (idx >= 0) currentGroups[category].splice(idx, 1);
        }
        alert(`🗑️ "${name}" moved to Deleted.`);

      async function restorePlayer(name, team, category, type) {
        if (!confirm(`Restore "${name}" to ${category}?`)) return;
        const delTable = type === "Patterns" ? "deleted_patterns" : "deleted_sparring";
        const catTable = type === "Patterns" ? "patterns_categories" : "sparring_categories";
        const { data: existing } = await sb.from(catTable).select("position_number").eq("category", category).order("position_number", { ascending: false }).limit(1);
        const nextPos = existing && existing[0] ? existing[0].position_number + 1 : 1;
        await sb.from(catTable).insert([{ name, team, category, position_number: nextPos }]);
        await sb.from(delTable).delete().eq("name", name).eq("category", category);
        alert(`♻️ "${name}" restored to ${category}.`);
        showDeleted();
      }

      /* ============================================================
         DRAG & DROP with UNDO tracking
         ============================================================ */
      function initDragAndDrop() {
        const playerRows = document.querySelectorAll('.player-row[data-draggable="true"]');
        playerRows.forEach((row) => {
          row.addEventListener("dragstart", handleDragStart);
          row.addEventListener("dragend", handleDragEnd);
          row.addEventListener("dragover", handleDragOver);
          row.addEventListener("dragenter", handleDragEnter);
          row.addEventListener("dragleave", handleDragLeave);
          row.addEventListener("drop", handleDrop);
        });
      }
      function handleDragStart(e) { e.target.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", e.target.dataset.playerId); }
      function handleDragEnd(e) { e.target.classList.remove("dragging"); document.querySelectorAll(".player-row.drag-over").forEach((el) => el.classList.remove("drag-over")); }
      function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = "move"; return false; }
      function handleDragEnter(e) { e.preventDefault(); if (e.target.classList.contains("player-row") && !e.target.classList.contains("dragging")) e.target.classList.add("drag-over"); }
      function handleDragLeave(e) { if (e.target.classList.contains("player-row")) e.target.classList.remove("drag-over"); }
      function handleDrop(e) {
        e.preventDefault(); e.stopPropagation();
        const draggedId = e.dataTransfer.getData("text/plain");
        const targetRow = e.target.closest(".player-row");
        if (!targetRow || targetRow.classList.contains("dragging")) return;
        targetRow.classList.remove("drag-over");
        const draggedRow = document.querySelector(`.player-row[data-player-id="${draggedId}"]`);
        if (!draggedRow || draggedRow === targetRow) return;
        swapPlayerRows(draggedRow, targetRow);
      }
      function swapPlayerRows(row1, row2) {
        const name1 = row1.querySelector(".p-name").innerText;
        const team1 = row1.querySelector(".p-team").innerText;
        const name2 = row2.querySelector(".p-name").innerText;
        const team2 = row2.querySelector(".p-team").innerText;

        // 🆕 Push undo action BEFORE swap
        pushUndo({
          type: "swap",
          category: row1.dataset.category || "",
          bracketType: row1.dataset.bracketType || "",
          description: `Swap "${name1}" ↔ "${name2}"`,
          beforeState: {
            row1Id: row1.dataset.playerId, row2Id: row2.dataset.playerId,
            row1Name: name1, row1Team: team1,
            row2Name: name2, row2Team: team2,
          },
          afterState: {
            row1Id: row1.dataset.playerId, row2Id: row2.dataset.playerId,
            row1Name: name2, row1Team: team2,
            row2Name: name1, row2Team: team1,
          },
          reverse: async () => {
            // Find the rows by their data-player-id and swap back
            const r1 = document.querySelector(`.player-row[data-player-id="${row1.dataset.playerId}"]`);
            const r2 = document.querySelector(`.player-row[data-player-id="${row2.dataset.playerId}"]`);
            if (r1 && r2) {
              r1.querySelector(".p-name").innerText = name1;
              r1.querySelector(".p-team").innerText = team1;
              r2.querySelector(".p-name").innerText = name2;
              r2.querySelector(".p-team").innerText = team2;
              // Save the reverted state
              const cat = r1.dataset.category;
              const bt = r1.dataset.bracketType;
              if (cat && bt) await saveCategoryOrder(cat, bt, true);
            }
          }
        });

        row1.querySelector(".p-name").innerText = name2;
        row2.querySelector(".p-name").innerText = name1;
        row1.querySelector(".p-team").innerText = team2;
        row2.querySelector(".p-team").innerText = team1;
        row1.style.background = "#c8e6c9";
        row2.style.background = "#c8e6c9";
        setTimeout(() => { row1.style.background = ""; row2.style.background = ""; }, 300);
      }

      function initContentEditableTracking() {

        editableNames.forEach(el => {
          el.addEventListener("focus", function() {
            this.dataset.oldValue = this.innerText;

            const oldVal = this.dataset.oldValue || "";
            const newVal = this.innerText;
            if (oldVal !== newVal) {
              const row = this.closest(".player-row");
              const category = row ? row.dataset.category : "";
              const bracketType = row ? row.dataset.bracketType : "";
              pushUndo({
                type: "edit_name",
                category,
                bracketType,
                description: `Edit name "${oldVal}" → "${newVal}"`,
                beforeState: { elementId: this.closest(".player-row").dataset.playerId, oldText: oldVal },
                afterState: { elementId: this.closest(".player-row").dataset.playerId, newText: newVal },
                reverse: async () => {
                  const targetRow = document.querySelector(`.player-row[data-player-id="${this.closest(".player-row").dataset.playerId}"]`);
                  if (targetRow) {
                    targetRow.querySelector(".p-name").innerText = oldVal;

      function exportAllToExcel(type) {
        const pages = document.querySelectorAll(".a4-page");
        if (pages.length === 0) { alert("Please generate brackets first."); return; }
        let csvContent = "data:text/csv;charset=utf-8,Category,Round,Match,Player 1,Team 1,Player 2,Team 2\n";
        pages.forEach((page) => {
          const title = page.querySelector("h2").innerText;
          const table = page.querySelector("table");
          if (!table) return;
          const rows = table.querySelectorAll("tbody tr");
          rows.forEach((tr, rowIndex) => {
            const cells = tr.querySelectorAll("td");
            cells.forEach((td, colIndex) => {
              if (td.getAttribute("rowspan")) {
                const matchBox = td.querySelector(".match-box");
                if (matchBox) {
                  const players = matchBox.querySelectorAll(".player-row");
                  if (players.length >= 2) {
                    const p1Name = players[0].querySelector(".p-name").innerText;
                    const p1Team = players[0].querySelector(".p-team").innerText;
                    const p2Name = players[1].querySelector(".p-name").innerText;
                    const p2Team = players[1].querySelector(".p-team").innerText;
                    const matchNum = Math.floor(rowIndex / Math.pow(2, colIndex)) + 1;
                    csvContent += `"${title}",${colIndex + 1},${matchNum},"${p1Name}","${p1Team}","${p2Name}","${p2Team}"\n`;
                  }
                }
              }
            });
          });
        });
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `${type}_Brackets_${new Date().toISOString().slice(0, 10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      async function fetchData() {
        try {
          lastDebugInfo = { registrations: [], competitors: [], judges: [], coaches: [], errors: [] };
          const { data: allRegs, error: regError } = await sb.from(REG_TABLE).select("*");
          if (regError) { lastDebugInfo.errors.push("REG FETCH: " + regError.message); throw regError; }
          lastDebugInfo.registrations = allRegs || [];
          const compRegs = (allRegs || []).filter((r) => { const t = (r.entry_type || r.type || r.role || "").toString().toLowerCase(); return t === "comp" || t === "competitor" || t === "c"; });
          const judgeRegs = (allRegs || []).filter((r) => { const t = (r.entry_type || r.type || r.role || "").toString().toLowerCase(); return t === "judge" || t === "j"; });
          const coachRegs = (allRegs || []).filter((r) => { const t = (r.entry_type || r.type || r.role || "").toString().toLowerCase(); return t === "coach" || t === "c2"; });
          const compIds = [...new Set(compRegs.map((r) => r.entry_id).filter(Boolean))];
          const judgeIds = [...new Set(judgeRegs.map((r) => r.entry_id).filter(Boolean))];
          const coachIds = [...new Set(coachRegs.map((r) => r.entry_id).filter(Boolean))];
          let compDetails = [], judgeDetails = [], coachDetails = [];
          if (compIds.length > 0) {
            const { data, error } = await sb.from("competitors").select("*").in("id", compIds);
            if (!error) compDetails = data || [];
          }
          if (judgeIds.length > 0) {
            const { data, error } = await sb.from("judges").select("*").in("id", judgeIds);
            if (!error) judgeDetails = data || [];
          }
          if (coachIds.length > 0) {
            const { data, error } = await sb.from("coaches").select("*").in("id", coachIds);
            if (!error) coachDetails = data || [];
          }
          lastDebugInfo.competitors = compDetails;
          lastDebugInfo.judges = judgeDetails;
          lastDebugInfo.coaches = coachDetails;
          competitors = []; judges = []; coaches = [];
          compDetails.forEach((person) => {
            const personRegs = compRegs.filter((r) => String(r.entry_id) === String(person.id));
            if (personRegs.length === 0) return;
            personRegs.forEach((reg) => {
              let entries = [];
              if (reg.entry_data?.entries_list && Array.isArray(reg.entry_data.entries_list)) entries = reg.entry_data.entries_list;
              else if (Array.isArray(reg.entry_data)) entries = reg.entry_data;
              else if (reg.entries_list && Array.isArray(reg.entries_list)) entries = reg.entries_list;
              else if (reg.entry_data && typeof reg.entry_data === 'object' && !Array.isArray(reg.entry_data)) {
                if (reg.entry_data.full_cat || reg.entry_data.discipline) entries = [reg.entry_data];
              } else if (reg.full_cat || reg.category || reg.discipline) {
                entries = [{ full_cat: reg.full_cat || reg.category, discipline: reg.discipline, label: reg.label }];
              }
              if (entries.length === 0) return;
              entries.forEach((entry) => {
                let fullCat = entry.full_cat || entry.category || entry.fullCat || "";
                let discipline = (entry.discipline || entry.type || "").toString().toLowerCase();
                let label = entry.label || entry.name || "";
                let parts = fullCat.split(" - ");
                if (parts.length < 2) parts = fullCat.split("-");
                if (parts.length < 2) parts = fullCat.split("/");
                const ageGroup = (parts[0] || "").trim() || "OTHER";
                const subCat = (parts[1] || "").trim() || "";
                competitors.push({ ...person, _reg_id: reg.id, _discipline: discipline, _label: label, _full_cat: fullCat, _actual_age_group: ageGroup, _actual_sub_cat: subCat });
              });
            });
          });
          judgeDetails.forEach((person) => {
            const personRegs = judgeRegs.filter((r) => String(r.entry_id) === String(person.id));
            if (personRegs.length === 0) judges.push({ ...person });
            else personRegs.forEach((reg) => judges.push({ ...person, _reg_id: reg.id }));
          });
          coachDetails.forEach((person) => {
            const personRegs = coachRegs.filter((r) => String(r.entry_id) === String(person.id));
            if (personRegs.length === 0) coaches.push({ ...person });
            else personRegs.forEach((reg) => coaches.push({ ...person, _reg_id: reg.id }));
          });
        } catch (error) {
          console.error("fetchData error:", error);
          document.getElementById("content").innerHTML = `<div class="empty-state" style="padding:30px;background:#fff3cd;border:1px solid #ffc107;border-radius:8px;"><h3 style="color:#856404;">⚠️ Error loading data</h3><p style="margin:10px 0;">${error.message || error}</p><button class="btn btn-primary" onclick="showDebugInfo()"><i class="fas fa-bug"></i> View Debug Info</button></div>`;
        }
      }

      function showDebugInfo() {

      function updateWeightDropdown() {
        const age = document.getElementById("sAge").value, gen = document.getElementById("sGen").value, wDrop = document.getElementById("sWeight"), info = document.getElementById("sparringInfo");

      function showTeamDetail(teamName, discipline) {
        const disciplineLabel = discipline === "patterns" ? "Patterns" : "Sparring";
        const headerClass = discipline === "patterns" ? "patterns-header" : "sparring-header";
        const iconClass = discipline === "patterns" ? "fa-chess-board" : "fa-fist-raised";
        const tagClass = discipline === "patterns" ? "patterns-tag" : "sparring-tag";
        const teamEntries = competitors.filter((c) => { const t = c.team || "Unassigned"; return t === teamName && c._discipline === discipline; });
        const byName = {};
        teamEntries.forEach((c) => { if (!byName[c.name]) byName[c.name] = { entries: [], gender: c.gender || "" }; byName[c.name].entries.push(c); });
        const competitorNames = Object.keys(byName).sort();
        let html = `<div class="controls"><button class="btn btn-secondary" onclick="showTeamOverview()"><i class="fas fa-arrow-left"></i> Back to Team Overview</button></div>
          <div class="team-detail-modal"><div class="team-detail-header ${headerClass}"><h3><i class="fas ${iconClass}"></i> ${teamName} — ${disciplineLabel}</h3><span style="background:rgba(255,255,255,0.2);padding:6px 14px;border-radius:20px;font-size:0.9rem;font-weight:600;">${competitorNames.length} competitors</span></div><div style="padding:15px 0;">`;
        if (competitorNames.length === 0) {
          html += `<div class="empty-team-detail">No ${disciplineLabel} registrations for this team.</div>`;
        } else {
          competitorNames.forEach((name) => {
            const data = byName[name];
            const entries = data.entries;
            const uniqueCats = new Set(entries.map((e) => e._full_cat));
            html += `<div class="competitor-detail-card"><div class="competitor-detail-header"><div class="competitor-detail-name"><i class="fas fa-user-circle" style="color:var(--primary);"></i> ${name}</div><span class="category-count-badge">${uniqueCats.size} categor${uniqueCats.size !== 1 ? 'ies' : 'y'}</span></div><div class="category-list">`;
            entries.forEach((e) => { html += `<span class="category-tag ${tagClass}"><i class="fas fa-tag" style="font-size:0.7rem;"></i> ${e._full_cat}</span>`; });
            html += `</div></div>`;
          });
        }
        html += `</div></div>`;
        document.getElementById("content").innerHTML = html;
        window.scrollTo({ top: 0, behavior: "smooth" });

      function createParallelCard(title, list) {
        if (list.length === 0) return `<div class="empty-state">No competitors found.</div>`;
        let n = "", t = "";
        list.forEach((c) => { n += `<div class="row-item">${c.name}</div>`; t += `<div class="row-item">${c.team || "N/A"}</div>`; });
        return `<div class="category-card"><div class="category-header">${title} <span class="category-count">${list.length}</span></div><div class="parallel-container"><div class="col-list"><div class="col-header"><i class="fas fa-user"></i> Competitors</div>${n}</div><div class="col-list"><div class="col-header"><i class="fas fa-users"></i> Teams</div>${t}</div></div></div>`;
      }

      function renderTeamSummary(list, type) {
        const uniqueByTeam = {};
        const entriesByTeam = {};
        list.forEach((c) => {
          const teamName = c.team || "Unassigned";
          if (!uniqueByTeam[teamName]) { uniqueByTeam[teamName] = new Set(); entriesByTeam[teamName] = 0; }
          uniqueByTeam[teamName].add(c.name);
          entriesByTeam[teamName]++;
        });
        const teamKeys = Object.keys(uniqueByTeam).sort();
        let totalUnique = 0, totalEntries = 0;
        teamKeys.forEach((t) => { totalUnique += uniqueByTeam[t].size; totalEntries += entriesByTeam[t]; });
        let h = `<h3 style="color:var(--primary);margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:5px">Team Summary (${type})</h3><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px">`;
        if (teamKeys.length === 0) h += `<span style="color:var(--gray);grid-column:1/-1">No data.</span>`;
        else {
          teamKeys.forEach((t) => {
            const uniqueCount = uniqueByTeam[t].size;
            const entryCount = entriesByTeam[t];
            const diffNote = entryCount > uniqueCount ? ` <span style="font-size:0.7rem;color:#e65100;">(${entryCount} entries)</span>` : '';
            h += `<div style="background:#f8f9fa;padding:8px;border-radius:4px;border-left:3px solid var(--secondary)"><strong style="display:block">${t}</strong><span style="font-size:0.85rem;color:var(--gray)">${uniqueCount} competitor${uniqueCount !== 1 ? 's' : ''}${diffNote}</span></div>`;
          });
        }
        h += `</div><div style="margin-top:15px;display:flex;gap:10px;flex-wrap:wrap;">
          <div style="flex:1;min-width:150px;padding:10px;background:var(--primary);color:white;border-radius:6px;font-weight:bold;text-align:center"><i class="fas fa-user-check"></i> Unique: ${totalUnique}</div>
          <div style="flex:1;min-width:150px;padding:10px;background:var(--secondary);color:white;border-radius:6px;font-weight:bold;text-align:center"><i class="fas fa-list"></i> Total Entries: ${totalEntries}</div>
        </div>`;
        document.getElementById("teamSummary").innerHTML = h;
      }

        await fetchData();
        let h = `<div class="category-card"><div class="category-header">Coaches List (${coaches.length})</div>`;
        if (coaches.length === 0) h += `<div style="padding:30px;text-align:center;color:var(--gray);">No coaches loaded.</div>`;
        else {
          h += `<table style="width:100%;border-collapse:collapse"><tr><th style="padding:10px;background:var(--light-gray)">Name</th><th style="padding:10px;background:var(--light-gray)">Belt</th><th style="padding:10px;background:var(--light-gray)">Team</th></tr>`;
          coaches.forEach((c) => (h += `<tr><td style="padding:8px;border-bottom:1px solid #eee">${c.name}</td><td style="padding:8px;border-bottom:1px solid #eee">${c.belt}</td><td style="padding:8px;border-bottom:1px solid #eee">${c.team || "N/A"}</td></tr>`));
          h += `</table>`;
        }
        document.getElementById("content").innerHTML = h + `</div>`;
      }

      /* ============================================================
         🆕 KEYBOARD SHORTCUT: Ctrl+Z for undo
         ============================================================ */
      document.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "z") {
          // Don't trigger if user is typing in an input
          const active = document.activeElement;
          const isTyping = active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA" || active.isContentEditable);
          if (isTyping) return;
          e.preventDefault();
          performUndo();
        }
      });

      const today = new Date();
      document.getElementById("tournamentDate").valueAsDate = today;
      tournamentDate = today.toISOString().split("T")[0];
      showPatterns();
    </script>
  </body>
</html>
