<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Registration</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      :root {
        --bg-body: #0f172a;
        --bg-panel: #1e293b;
        --bg-card: #334155;
        --text-main: #f1f5f9;
        --text-muted: #94a3b8;
        --accent-secondary: #10b981;
        --accent-register: #f59e0b;
        --accent-primary: #3b82f6;
        --accent-alert: #ef4444;
        --radius-md: 12px;
        --radius-lg: 20px;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        background-color: var(--bg-panel);
        padding: 1rem 2rem;
        border-bottom: 1px solid rgba(255,255, 255, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header-actions {
        display: flex;
        gap: 1rem;
        align-items: center;
      }

      .back-link {
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .back-link:hover { color: white; }

      /* Add to My Team Button */
      .btn-add-team {
        background-color: var(--accent-primary);
        color: white;
        text-decoration: none;
        padding: 0.6rem 1.2rem;
        border-radius: var(--radius-md);
        font-weight: 600;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-add-team:hover {
        background-color: #2563eb;
        transform: translateY(-2px);
      }

      main {
        flex: 1;
        padding: 2rem 1rem;
        max-width: 1400px;
        margin: 0 auto;
        width: 100%;
      }

      h1 { margin-bottom: 1rem; font-size: 1.8rem; text-align: center; }

      /* Category Accordion */
      .category-section {
        background-color: var(--bg-panel);
        border: 1px solid rgba(255,255,255, 0.1);
        border-radius: var(--radius-lg);
        margin-bottom: 1.5rem;
        overflow: hidden;
      }

      .category-header {
        background: var(--bg-card);
        padding: 1rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        user-select: none;
        transition: background 0.2s;
      }

      .category-header:hover {
        background: #3f4e68;
      }

      .category-title {
        font-weight: 700;
        font-size: 1.3rem;
        color: var(--text-main);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      /* Split Content */
      .split-content {
        display: none;
        border-top: 1px solid rgba(255,255,255, 0.1);
      }
      .split-content.open {
        display: block;
      }

      .split-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        padding: 1.5rem;
        background-color: var(--bg-body);
        min-height: 100px;
      }

      /* Column Headers */
      .col-header {
        text-align: center;
        font-size: 0.9rem;
        font-weight: 700;
        margin-bottom: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        padding-bottom: 0.5rem;
        border-bottom: 1px solid rgba(255,255,255, 0.05);
      }

      /* The Person Card */
      .person-card {
        background-color: var(--bg-card);
        border: 2px solid transparent;
        border-radius: var(--radius-md);
        padding: 1rem;
        cursor: default;
        transition: all 0.2s ease;
        position: relative;
        margin-bottom: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      /* LEFT COLUMN (Available) */
      .col-left .person-card {
        cursor: pointer;
      }
      .col-left .person-card:hover {
        transform: translateY(-3px);
        border-color: var(--accent-primary);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      }

      /* RIGHT COLUMN (Registered) */
      .col-right .person-card {
        opacity: 0.6;
        cursor: not-allowed;
        background-color: rgba(16, 185, 129, 0.05);
        border-color: var(--accent-secondary);
      }

      .card-name {
        font-size: 1.1rem;
        font-weight: 700;
      }

      .card-details {
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      /* Unregister Button (X) */
      .btn-unregister {
        position: absolute;
        top: 8px;
        right: 8px;
        background: rgba(239, 68, 68, 0.2);
        color: var(--accent-alert);
        border: 1px solid var(--accent-alert);
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-unregister:hover {
        background: var(--accent-alert);
        color: white;
      }

      /* Submit Bar */
      .submit-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background-color: var(--bg-panel);
        padding: 1rem 2rem;
        border-top: 1px solid rgba(255,255,255, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        z-index: 100;
      }

      .counter {
        font-size: 1.1rem;
        color: var(--text-muted);
      }
      .counter span {
        color: var(--accent-primary);
        font-weight: 700;
        font-size: 1.4rem;
      }

      .btn-submit {
        background-color: var(--accent-secondary);
        color: #fff;
        border: none;
        padding: 0.8rem 2rem;
        border-radius: var(--radius-md);
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      }
      .btn-submit:hover { background-color: #059669; transform: translateY(-2px); }
      .btn-submit:disabled {
        background-color: var(--bg-card);
        color: var(--text-muted);
        cursor: not-allowed;
        transform: none;
      }

      .loading-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15, 23, 42, 0.8);
        display: flex; justify-content: center; align-items: center;
        z-index: 2000; display: none;
      }
      .spinner {
        width: 50px; height: 50px;
        border: 5px solid rgba(255,255,255,0.1);
        border-top-color: var(--accent-secondary);
        border-radius: 50%;
        animation: spin 1s infinite linear;
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }

      @media (max-width: 768px) {
        .split-grid { grid-template-columns: 1fr; gap: 0.5rem; }
        .category-header { flex-direction: column; align-items: flex-start; gap: 5px; }
        .header-actions { width: 100%; justify-content: space-between; }
      }
    </style>
  </head>
  <body>

    <header>
      <div class="logo">Team Registration</div>
      <div class="header-actions">
        <!-- Add to My Team Button -->
        <a href="register.html" class="btn-add-team">
          <i class="fas fa-user-plus"></i> Add to My Team
        </a>
        
        <!-- Back to Main -->
        <a href="index.html" class="back-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Back to Main
        </a>
      </div>
    </header>

    <main>
      <h1>Select Participants</h1>

      <!-- COMPETITORS SECTION -->
      <div class="category-section" id="sec-competitors">
        <div class="category-header" onclick="toggleSection('sec-competitors')">
          <div class="category-title">
            <span class="category-icon"><i class="fas fa-users"></i></span>
            Competitors
          </div>
          <div style="color: var(--text-muted);">
            <i class="fas fa-chevron-down" id="icon-sec-competitors"></i>
          </div>
        </div>
        <div class="split-content" id="content-sec-competitors">
          <div class="split-grid">
            <div class="col-left" id="comp-left">
              <div class="col-header">Available to Register</div>
            </div>
            <div class="col-right" id="comp-right">
              <div class="col-header" style="color: var(--accent-secondary)">Already Registered</div>
            </div>
          </div>
        </div>
      </div>

      <!-- JUDGES SECTION -->
      <div class="category-section" id="sec-judges">
        <div class="category-header" onclick="toggleSection('sec-judges')">
          <div class="category-title">
            <span class="category-icon"><i class="fas fa-gavel"></i></span>
            Judges / Referees
          </div>
          <div style="color: var(--text-muted);">
            <i class="fas fa-chevron-down" id="icon-sec-judges"></i>
          </div>
        </div>
        <div class="split-content" id="content-sec-judges">
          <div class="split-grid">
            <div class="col-left" id="judge-left">
              <div class="col-header">Available to Register</div>
            </div>
            <div class="col-right" id="judge-right">
              <div class="col-header" style="color: var(--accent-secondary)">Already Registered</div>
            </div>
          </div>
        </div>
      </div>

      <!-- COACHES SECTION -->
      <div class="category-section" id="sec-coaches">
        <div class="category-header" onclick="toggleSection('sec-coaches')">
          <div class="category-title">
            <span class="category-icon"><i class="fas fa-chalkboard-teacher"></i></span>
            Coaches
          </div>
          <div style="color: var(--text-muted);">
            <i class="fas fa-chevron-down" id="icon-sec-coaches"></i>
          </div>
        </div>
        <div class="split-content" id="content-sec-coaches">
          <div class="split-grid">
            <div class="col-left" id="coach-left">
              <div class="col-header">Available to Register</div>
            </div>
            <div class="col-right" id="coach-right">
              <div class="col-header" style="color: var(--accent-secondary)">Already Registered</div>
            </div>
          </div>
        </div>
      </div>

    </main>

    <div class="submit-bar">
      <div class="counter">Selected: <span id="selectedCount">0</span></div>
      <button id="btnSubmit" class="btn-submit" disabled>Confirm Registration</button>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
      <div class="spinner"></div>
    </div>

    <script>
      const SUPABASE_URL = "https://cziwnycosdxeuacslcza.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6aXdueWNvc2R4ZXVhY3NsY3phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY3MTkxMDAsImV4cCI6MjA4MjI5NTEwMH0.7OvfatHP7RAp6JS1F5hMlwfdSDgpN7EXsY2SVMoFSoY";

      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { storage: window.sessionStorage }
      });

      const selectedIds = new Set(); 
      
      // DOM Elements
      const btnSubmit = document.getElementById("btnSubmit");
      const selectedCountSpan = document.getElementById("selectedCount");
      const loadingOverlay = document.getElementById("loadingOverlay");

      // ==========================================
      // GLOBAL SCOPE FUNCTIONS
      // ==========================================
      
      // Moved to top level to ensure btnSubmit can access it inside click handlers
      async function unregisterPerson(registrationId) {
        loadingOverlay.style.display = "flex";
        
        const { error } = await client
          .from("final_registrations")
          .delete()
          .eq("id", registrationId); // Delete by Registration Row ID

        loadingOverlay.style.display = "none";

        if (error) {
          alert("Error unregistering: " + error.message);
        } else {
          // Success
          alert("Unregistered successfully.");
          
          // Reload the page to update the view
          // We use location.reload() to force a clean refresh from the server
          window.location.reload();
        }
      }

      // ==========================================
      // INIT & LOAD LOGIC
      // ==========================================
      async function init() {
        const { data: { session } } = await client.auth.getSession();
        
        if (!session) {
          localStorage.setItem('redirectAfterLogin', 'registration.html');
          window.location.href = "register.html";
          return;
        }

        loadAllData(session.user.id);
      }

      async function loadAllData(userId) {
        loadingOverlay.style.display = "flex";

        // 1. Fetch People Pool
        const [compRes, judgeRes, coachRes] = await Promise.all([
          client.from("competitors").select("*").eq("user_id", userId),
          client.from("judges").select("*").eq("user_id", userId),
          client.from("coaches").select("*").eq("user_id", userId),
        ]);

        // 2. Fetch Registrations
        const { data: regData, error: regError } = await client
          .from("final_registrations")
          .select("*") // Select all to get ID and Entry ID
          .eq("user_id", userId);

        // 3. Create Map of Person ID -> Registration Row
        const regMap = new Map();
        if (regData && !regError) {
          regData.forEach(r => {
            regMap.set(String(r.entry_id), r);
          });
        }

        // 4. Render Sections
        renderSplitSection("comp", "Competitors", "fa-users", compRes.data || [], regMap);
        renderSplitSection("judge", "Judges", "fa-gavel", judgeRes.data || [], regMap);
        renderSplitSection("coach", "Coaches", "fa-chalkboard-teacher", coachRes.data || [], regMap);

        // Open first section
        toggleSection("sec-competitors");
        
        loadingOverlay.style.display = "none";
      }

      function renderSplitSection(typeShort, typeName, iconClass, data, regMap) {
        const leftContainer = document.getElementById(`${typeShort}-left`);
        const rightContainer = document.getElementById(`${typeShort}-right`);

        leftContainer.innerHTML = ""; 
        rightContainer.innerHTML = "";

        if (data.length === 0) {
          leftContainer.innerHTML = `<div style="color:var(--text-muted); font-style:italic; padding:1rem;">No ${typeName.toLowerCase()} found.</div>`;
          rightContainer.innerHTML = `<div style="color:var(--text-muted); font-style:italic; padding:1rem;">None registered yet.</div>`;
          return;
        }

        data.forEach(person => {
          const personIdStr = String(person.id);
          const registration = regMap.get(personIdStr); 
          const isRegistered = !!registration;

          const card = document.createElement("div");
          card.className = "person-card";
          
          let details = "";
          if (typeShort === 'comp') {
            details = `<div class="card-details"><i class="fas fa-weight"></i> ${person.weight}kg</div>`;
          }

          card.innerHTML = `
            <div class="card-name">${person.name}</div>
            ${details}
          `;

          if (isRegistered) {
            // ADD TO RIGHT SIDE
            const btnUnreg = document.createElement("div");
            btnUnreg.className = "btn-unregister";
            btnUnreg.innerHTML = '<i class="fas fa-times"></i>';
            btnUnreg.title = "Unregister from Tournament";
            
            // Click Event: Unregister
            btnUnreg.addEventListener("click", async (e) => {
              e.stopPropagation();
              if(confirm(`Unregister ${person.name} from the tournament? This will allow you to register them again.`)) {
                await unregisterPerson(registration.id); // Use Registration ID
              }
            });

            card.appendChild(btnUnreg);
            rightContainer.appendChild(card);
          } else {
            // ADD TO LEFT SIDE (Available)
            card.dataset.id = personIdStr;
            card.dataset.type = typeShort;
            card.dataset.raw = JSON.stringify(person);

            card.addEventListener("click", () => toggleSelection(card));
            leftContainer.appendChild(card);
          }
        });
      }

      function toggleSection(sectionId) {
        document.querySelectorAll(".split-content").forEach(el => el.classList.remove("open"));
        document.querySelectorAll(".category-header i.fa-chevron-up").forEach(el => {
            el.classList.remove("fa-chevron-up");
            el.classList.add("fa-chevron-down");
        });

        const content = document.getElementById(`content-${sectionId}`);
        const icon = document.getElementById(`icon-${sectionId}`);
        
        if (!content.classList.contains("open")) {
          content.classList.add("open");
          icon.classList.remove("fa-chevron-down");
          icon.classList.add("fa-chevron-up");
        }
      }

      function toggleSelection(card) {
        const id = card.dataset.id;
        
        if (selectedIds.has(id)) {
          selectedIds.delete(id);
          card.style.borderColor = "transparent";
          card.style.backgroundColor = "var(--bg-card)";
        } else {
          selectedIds.add(id);
          card.style.borderColor = "var(--accent-primary)";
          card.style.backgroundColor = "rgba(59, 130, 246, 0.1)";
        }
        updateUI();
      }

      function updateUI() {
        const count = selectedIds.size;
        selectedCountSpan.textContent = count;
        
        if (count > 0) {
          btnSubmit.disabled = false;
          btnSubmit.textContent = `Register ${count} People`;
        } else {
          btnSubmit.disabled = true;
          btnSubmit.textContent = "Select Participants";
        }
      }

      btnSubmit.addEventListener("click", async () => {
        if (selectedIds.size === 0) return;
        loadingOverlay.style.display = "flex";

        const cards = document.querySelectorAll(".col-left .person-card[style*='border-color']");
        const insertData = [];
        const userId = (await client.auth.getSession()).data.session.user.id;

        cards.forEach(card => {
          const rawPerson = JSON.parse(card.dataset.raw);
          const type = card.dataset.type; 

          insertData.push({
            user_id: userId,
            entry_type: type,
            entry_id: card.dataset.id,
            entry_data: rawPerson 
          });
        });

        const { error } = await client.from("final_registrations").insert(insertData);

        loadingOverlay.style.display = "none";

        if (error) {
          if (error.message.includes("unique_entry_per_user")) {
             alert("One or more selected people are already registered!");
          } else {
             alert("Error registering: " + error.message);
          }
        } else {
          alert("Successfully registered " + insertData.length + " participants!");
          window.location.reload();
        }
      });

      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
