<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Registration</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      :root {
        --bg-body: #0f172a;
        --bg-panel: #1e293b;
        --bg-card: #334155;
        --text-main: #f1f5f9;
        --text-muted: #94a3b8;
        --accent-secondary: #10b981;
        --accent-warning: #f59e0b;
        --accent-primary: #3b82f6;
        --accent-alert: #ef4444;
        --radius-md: 12px;
        --radius-lg: 20px;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      .hidden { display: none !important; }

      body {
        font-family: "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        background-color: var(--bg-panel);
        padding: 1rem 2rem;
        border-bottom: 1px solid rgba(255,255,255, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .header-left { display: flex; align-items: center; gap: 1rem; }
      .header-right { display: flex; align-items: center; gap: 1rem; }

      .back-link {
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .back-link:hover { color: white; }

      /* Toggle Switches */
      .cat-toggle-container {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.9rem;
        color: var(--text-muted);
        background: rgba(255,255,255,0.05);
        padding: 5px 10px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.1);
      }
      .switch {
        position: relative; display: inline-block; width: 34px; height: 20px;
      }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
        background-color: #ccc; transition: .4s; border-radius: 20px;
      }
      .slider:before {
        position: absolute; content: ""; height: 14px; width: 14px;
        left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
      }
      input:checked + .slider { background-color: var(--accent-primary); }
      input:checked + .slider:before { transform: translateX(14px); }

      /* Additional Categories Toggle Style */
      .btn-add-extras {
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.3);
        color: var(--accent-secondary);
        padding: 0.6rem 1.2rem;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-add-extras.active {
        background: var(--accent-secondary);
        color: white;
        box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
      }

      /* Auth Section */
      .auth-container {
        max-width: 400px;
        margin: 3rem auto;
        background: var(--bg-panel);
        padding: 2rem;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
      }
      .auth-title { text-align: center; margin-bottom: 1.5rem; color: var(--accent-primary); }
      .form-group { margin-bottom: 1rem; }
      .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }
      .form-input {
        width: 100%; padding: 0.8rem;
        background: var(--bg-body); border: 1px solid rgba(255,255,255,0.2);
        border-radius: var(--radius-md); color: white;
      }
      .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 1.5rem; }
      .btn-full { width: 100%; justify-content: center; }

      /* Main Content */
      main {
        flex: 1;
        padding: 2rem 1rem;
        max-width: 1400px;
        margin: 0 auto;
        width: 100%;
      }
      h1 { margin-bottom: 1rem; font-size: 1.8rem; text-align: center; }

      /* Category Accordion */
      .category-section {
        background-color: var(--bg-panel);
        border: 1px solid rgba(255,255,255, 0.1);
        border-radius: var(--radius-lg);
        margin-bottom: 1.5rem;
        overflow: hidden;
      }
      .category-header {
        background: var(--bg-card);
        padding: 1rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        user-select: none;
        transition: background 0.2s;
      }
      .category-header:hover { background: #3f4e68; }
      .category-title {
        font-weight: 700; font-size: 1.3rem;
        color: var(--text-main); display: flex; align-items: center; gap: 12px;
      }
      .category-icon { color: var(--accent-primary); width: 24px; text-align: center; }

      /* Split Content */
      .split-content { display: none; border-top: 1px solid rgba(255,255,255, 0.1); }
      .split-content.open { display: block; }
      .split-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;
        padding: 1.5rem; background-color: var(--bg-body); min-height: 100px;
      }
      .col-header {
        text-align: center; font-size: 0.9rem; font-weight: 700;
        margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px;
        color: var(--text-muted); padding-bottom: 0.5rem;
        border-bottom: 1px solid rgba(255,255,255, 0.05);
      }

      /* Person Card */
      .person-card {
        background-color: var(--bg-card); border: 2px solid transparent;
        border-radius: var(--radius-md); padding: 1rem;
        cursor: default; transition: all 0.2s ease;
        position: relative; margin-bottom: 1rem;
        display: flex; flex-direction: column; gap: 0.5rem;
      }
      .col-left .person-card { cursor: pointer; }
      .col-left .person-card:hover {
        transform: translateY(-3px); border-color: var(--accent-primary);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      }
      /* Pulsing Effect for Extra Categories Mode */
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); border-color: var(--accent-primary); }
        70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); border-color: rgba(59, 130, 246, 0.5); }
        100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); border-color: transparent; }
      }
      body.extra-mode .col-left .person-card {
        animation: pulse 2s infinite;
        cursor: pointer;
      }
      body.extra-mode .col-left .person-card:hover {
        animation: none; /* Stop pulsing on hover to interact */
        border-color: var(--accent-primary);
        background: rgba(59, 130, 246, 0.1);
      }
      /* Expanded State */
      .person-card.expanded {
        background: #2b3a50; /* Slightly lighter bg */
        border-color: var(--accent-primary);
      }

      .col-right .person-card {
        opacity: 0.6; cursor: not-allowed;
        background-color: rgba(16, 185, 129, 0.05);
        border-color: var(--accent-secondary);
      }

      .card-header-row { display: flex; justify-content: space-between; align-items: flex-start; }
      .card-name { font-size: 1.1rem; font-weight: 700; }

      /* Category Tags */
      .card-categories {
        display: flex; flex-direction: column; gap: 4px;
        font-size: 0.75rem; margin-top: 4px;
        transition: opacity 0.3s;
      }
      body.hide-categories .card-categories { display: none; }
      .cat-tag { display: flex; align-items: center; gap: 6px; padding: 2px 0; color: var(--text-muted); }
      .cat-tag i { width: 14px; text-align: center; }
      .cat-spar { color: #a78bfa; }
      .cat-pat { color: #fcd34d; }

      .card-details { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }

      /* Extra Categories Options Panel */
      .extra-options-panel {
        display: none;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px dashed rgba(255,255,255,0.2);
        flex-direction: column;
        gap: 8px;
        animation: slideDown 0.3s ease;
      }
      .person-card.expanded .extra-options-panel { display: flex; }

      @keyframes slideDown {
        from { opacity: 0; max-height: 0; }
        to { opacity: 1; max-height: 500px; }
      }

      .extra-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.85rem;
        background: rgba(0,0,0,0.2);
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid transparent;
        transition: 0.2s;
      }
      .extra-row:hover {
        border-color: rgba(59, 130, 246, 0.3);
      }
      .extra-label {
        flex: 1;
        color: var(--text-muted);
      }
      .extra-cat-name {
        color: var(--accent-primary);
        font-weight: 600;
        margin-left: 5px;
      }
      .extra-checkbox {
        width: 18px; height: 18px;
        accent-color: var(--accent-secondary);
        cursor: pointer;
      }

      /* Info Button */
      .btn-info {
        background: rgba(59, 130, 246, 0.1); color: var(--accent-primary);
        border: 1px solid rgba(59, 130, 246, 0.3); width: 28px; height: 28px;
        border-radius: 6px; display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: 0.2s; z-index: 5;
      }
      .btn-info:hover { background: var(--accent-primary); color: white; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }

      /* Unregister Button */
      .btn-unregister {
        position: absolute; top: 5px; right: 5px;
        background: rgba(239, 68, 68, 0.2); color: var(--accent-alert);
        border: 1px solid var(--accent-alert); width: 26px; height: 26px;
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: 0.2s; z-index: 10;
      }
      .btn-unregister:hover { background: var(--accent-alert); color: white; }

      /* Submit Bar */
      .submit-bar {
        position: fixed; bottom: 0; left: 0; width: 100%;
        background-color: var(--bg-panel); padding: 1rem 2rem;
        border-top: 1px solid rgba(255,255,255, 0.1);
        display: flex; justify-content: space-between; align-items: center;
        box-shadow: 0 -4px 10px rgba(0,0,0,0.2); z-index: 100;
      }
      .counter { font-size: 1.1rem; color: var(--text-muted); }
      .counter span { color: var(--accent-primary); font-weight: 700; font-size: 1.4rem; }
      .btn-submit {
        background-color: var(--accent-secondary); color: #fff; border: none;
        padding: 0.8rem 2rem; border-radius: var(--radius-md);
        font-size: 1.1rem; font-weight: 700; cursor: pointer;
        transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      }
      .btn-submit:hover { background-color: #059669; transform: translateY(-2px); }
      .btn-submit:disabled { background-color: var(--bg-card); color: var(--text-muted); cursor: not-allowed; transform: none; }

      /* Modal */
      .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.8); display: flex;
        justify-content: center; align-items: center; z-index: 2000;
        opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        backdrop-filter: blur(5px);
      }
      .modal-overlay.active { opacity: 1; pointer-events: all; }
      .modal-box {
        background: var(--bg-panel); width: 90%; max-width: 600px;
        border-radius: var(--radius-lg); border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        transform: scale(0.9); transition: transform 0.3s ease;
        display: flex; flex-direction: column; max-height: 90vh;
      }
      .modal-overlay.active .modal-box { transform: scale(1); }
      .modal-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
      .modal-title { font-size: 1.5rem; font-weight: 700; color: var(--accent-primary); }
      .modal-close-btn { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
      .modal-close-btn:hover { color: white; }
      .modal-body { padding: 2rem; overflow-y: auto; }
      .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
      .full-width { grid-column: span 2; }
      .stat-label { display: block; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 0.5rem; }
      .stat-value { font-size: 1.2rem; font-weight: 600; color: var(--text-main); padding: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid transparent; }
      .stat-input { display: none; width: 100%; padding: 0.6rem; background: var(--bg-body); border: 1px solid var(--accent-primary); color: white; border-radius: 8px; font-size: 1.1rem; font-family: inherit; }
      .modal-box.editing .stat-value { display: none; }
      .modal-box.editing .stat-input { display: block; }
      .modal-footer { padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: flex-end; gap: 1rem; }
      .btn-modal { padding: 0.6rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
      .btn-cancel { background: rgba(255,255,255,0.1); color: var(--text-main); }
      .btn-cancel:hover { background: rgba(255,255,255,0.2); }
      .btn-edit { background: var(--accent-warning); color: #1a1a1a; }
      .btn-edit:hover { background: #d97706; }
      .btn-save { background: var(--accent-secondary); color: white; display: none; }
      .btn-save:hover { background: #059669; }
      .modal-box.editing .btn-edit { display: none; }
      .modal-box.editing .btn-save { display: inline-block; }

      /* Loading */
      .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; display: none; }
      .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top-color: var(--accent-secondary); border-radius: 50%; animation: spin 1s infinite linear; }
      @keyframes spin { 100% { transform: rotate(360deg); } }

      /* Buttons */
      .btn { padding: 0.6rem 1.2rem; border: none; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; }
      .btn-primary { background-color: var(--accent-primary); color: white; }
      .btn-primary:hover { background-color: #2563eb; }
      .btn-secondary { background-color: rgba(255, 255, 255, 0.1); color: var(--text-main); }
      .btn-secondary:hover { background-color: rgba(255, 255, 255, 0.2); }

      @media (max-width: 768px) {
        .split-grid { grid-template-columns: 1fr; gap: 0.5rem; }
        .category-header { flex-direction: column; align-items: flex-start; gap: 5px; }
        .stat-grid { grid-template-columns: 1fr; }
        .full-width { grid-column: span 1; }
        header { flex-direction: column; align-items: stretch; }
        .header-right { flex-direction: column; }
      }
    </style>
  </head>
  <body>

    <header>
      <div class="header-left">
        <div class="logo" style="font-weight:bold; color:white; font-size:1.2rem;">Team Registration</div>
        <a href="index.html" class="back-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Back
        </a>
      </div>

      <div class="header-right">
        <!-- CATEGORY TOGGLE BUTTON -->
        <div class="cat-toggle-container">
          <i class="fas fa-tags"></i> Categories
          <label class="switch">
            <input type="checkbox" id="catToggle" checked>
            <span class="slider"></span>
          </label>
        </div>
        
        <!-- ADDITIONAL CATEGORIES BUTTON -->
        <button id="btnExtrasToggle" class="btn btn-add-extras">
          <i class="fas fa-plus-circle"></i> Additional Categories
        </button>
        
        <a href="register.html" class="btn btn-primary" id="addTeamLink">
          <i class="fas fa-user-plus"></i> Add Person
        </a>
      </div>
    </header>

    <!-- AUTH SECTION -->
    <div id="authSection" class="auth-container">
      <h2 class="auth-title">Account Access</h2>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="Enter your email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter your password" />
      </div>
      <div class="btn-group">
        <button id="signinBtn" class="btn btn-primary btn-full">Sign In</button>
        <button id="signupBtn" class="btn btn-secondary btn-full">Sign Up</button>
        <button id="forgotBtn" class="btn btn-secondary btn-full" style="font-size:0.8rem; color:var(--text-muted)">Forgot Password?</button>
      </div>
      <div id="authMessage" style="margin-top:1rem; text-align:center; font-size:0.9rem;"></div>
    </div>

    <!-- MAIN CONTENT -->
    <main id="competitionSection" class="hidden">
      <h1>Select Participants</h1>

      <!-- COMPETITORS SECTION -->
      <div class="category-section" id="sec-competitors">
        <div class="category-header" onclick="toggleSection('sec-competitors')">
          <div class="category-title">
            <span class="category-icon"><i class="fas fa-users"></i></span>
            Competitors
          </div>
          <div style="color: var(--text-muted);">
            <i class="fas fa-chevron-down" id="icon-sec-competitors"></i>
          </div>
        </div>
        <div class="split-content" id="content-sec-competitors">
          <div class="split-grid">
            <div class="col-left" id="comp-left">
              <div class="col-header">Available to Register</div>
            </div>
            <div class="col-right" id="comp-right">
              <div class="col-header" style="color: var(--accent-secondary)">Already Registered</div>
            </div>
          </div>
        </div>
      </div>

      <!-- JUDGES SECTION -->
      <div class="category-section" id="sec-judges">
        <div class="category-header" onclick="toggleSection('sec-judges')">
          <div class="category-title">
            <span class="category-icon"><i class="fas fa-gavel"></i></span>
            Judges / Referees
          </div>
          <div style="color: var(--text-muted);">
            <i class="fas fa-chevron-down" id="icon-sec-judges"></i>
          </div>
        </div>
        <div class="split-content" id="content-sec-judges">
          <div class="split-grid">
            <div class="col-left" id="judge-left">
              <div class="col-header">Available to Register</div>
            </div>
            <div class="col-right" id="judge-right">
              <div class="col-header" style="color: var(--accent-secondary)">Already Registered</div>
            </div>
          </div>
        </div>
      </div>

      <!-- COACHES SECTION -->
      <div class="category-section" id="sec-coaches">
        <div class="category-header" onclick="toggleSection('sec-coaches')">
          <div class="category-title">
            <span class="category-icon"><i class="fas fa-chalkboard-teacher"></i></span>
            Coaches
          </div>
          <div style="color: var(--text-muted);">
            <i class="fas fa-chevron-down" id="icon-sec-coaches"></i>
          </div>
        </div>
        <div class="split-content" id="content-sec-coaches">
          <div class="split-grid">
            <div class="col-left" id="coach-left">
              <div class="col-header">Available to Register</div>
            </div>
            <div class="col-right" id="coach-right">
              <div class="col-header" style="color: var(--accent-secondary)">Already Registered</div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div class="submit-bar" id="submitBar">
      <div class="counter">Selected: <span id="selectedCount">0</span></div>
      <button id="btnSubmit" class="btn-submit" disabled>Confirm Registration</button>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
      <div class="spinner"></div>
    </div>

    <!-- MODAL -->
    <div id="infoModal" class="modal-overlay">
      <div class="modal-box" id="infoModalBox">
        <div class="modal-header">
          <h3 class="modal-title" id="modalPersonTitle">Person Name</h3>
          <button class="modal-close-btn" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div id="modalStatsContainer" class="stat-grid"></div>
        </div>
        <div class="modal-footer">
          <button class="btn-modal btn-cancel" onclick="closeModal()">Close</button>
          <button class="btn-modal btn-edit" onclick="toggleEditMode()">Edit Info</button>
          <button class="btn-modal btn-save" onclick="savePersonChanges()">Save Changes</button>
        </div>
      </div>
    </div>

    <script>

      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { storage: window.sessionStorage }
      });

      const selectedIds = new Set();

      const selectedExtras = new Map(); 
      
      const authSection = document.getElementById("authSection");
      const competitionSection = document.getElementById("competitionSection");
      const submitBar = document.getElementById("submitBar");
      const btnSubmit = document.getElementById("btnSubmit");
      const selectedCountSpan = document.getElementById("selectedCount");
      const loadingOverlay = document.getElementById("loadingOverlay");
      let isExtraMode = false;

      let currentEditingPerson = null;
      let tournamentDate = new Date().toISOString().split('T')[0];

      // ==========================================

      document.getElementById('btnExtrasToggle').addEventListener('click', () => {

      // ==========================================
      // LOGIC
      // ==========================================
      const RULES = {
        SPARRING: {
          KIDS: { time: "2 x 1 min", M: ["-20", "-25", "-30", "-35", "+35"], F: ["-20", "-25", "-30", "-35", "+35"] },
          YOUTH: { time: "2 x 1.30 min", M: ["-25", "-30", "-35", "-40", "+40"], F: ["-25", "-30", "-35", "-40", "+40"] },
          OLDER_YOUTH: { time: "2 x 1.30 min", M: ["-35", "-40", "-45", "-50", "-55", "-60", "+60"], F: ["-30", "-35", "-40", "-45", "-50", "-55", "+55"] },
          JUNIORS: { time: "2 x 2 min", M: ["-45", "-50", "-55", "-60", "-65", "-70", "+70"], F: ["-40", "-45", "-50", "-55", "-60", "-65", "+65"] },
        },
        AGE_ORDER: ["KIDS", "YOUTH", "OLDER_YOUTH", "JUNIORS"]
      };

      function extractBeltNumber(belt) {
        if (!belt) return -1;
        const match = belt.match(/(\d+)/);
        return match ? parseInt(match[1]) : -1;
      }

      // Updated Dan Logic (Individual Dans)
      function getBeltGroup(belt) {
        if (!belt) return "Unknown";
        const beltUpper = belt.toUpperCase();
        if (beltUpper.includes("DAN")) {
           const num = extractBeltNumber(belt);
           if (num >= 1 && num <= 2) return "1-2 Dan";
           if (num >= 3 && num <= 4) return "3-4 Dan";
           if (num >= 5) return "5+ Dan";
           return "Dan Grades";
        }
        const num = extractBeltNumber(belt);
        if (num === 10 || num === 9) return "10-9 Kup";
        if (num === 8 || num === 7) return "8-7 Kup";
        if (num === 6 || num === 5) return "6-5 Kup";
        if (num === 4 || num === 3) return "4-3 Kup";
        if (num === 2 || num === 1) return "2-1 Kup";
        return belt;
      }

      function getAge(birth) {
        if (!birth) return 0;
        const b = new Date(birth);
        if (isNaN(b.getTime())) return 0;
        const today = tournamentDate ? new Date(tournamentDate) : new Date();
        let age = today.getFullYear() - b.getFullYear();
        if (today.getMonth() < b.getMonth() || (today.getMonth() === b.getMonth() && today.getDate() < b.getDate())) age--;
        return age;
      }

      function getAgeGroup(age) {
        if (age >= 6 && age <= 9) return "KIDS";
        if (age >= 10 && age <= 11) return "YOUTH";
        if (age >= 12 && age <= 13) return "OLDER_YOUTH";
        if (age >= 14 && age <= 16) return "JUNIORS";
        return "OTHER";
      }

      function getHigherAgeGroup(currentAg) {
        const idx = RULES.AGE_ORDER.indexOf(currentAg);
        if (idx !== -1 && idx < RULES.AGE_ORDER.length - 1) {
          return RULES.AGE_ORDER[idx + 1];
        }
        return null;
      }

      function getSparringWeightClass(ageGroup, gender, weight) {
        if (!RULES.SPARRING[ageGroup]) return null;
        const classes = RULES.SPARRING[ageGroup][gender];
        if (!classes) return null;
        for (let i = 0; i < classes.length; i++) {
          const cls = classes[i];
          if (cls.startsWith("-")) {
            const upper = parseInt(cls.replace("-", ""));
            const lower = i === 0 ? 0 : parseInt(classes[i - 1].replace(/[^0-9]/g, ""));
            if (weight > lower && weight <= upper) return cls;
          }
          if (cls.startsWith("+")) {
            const lower = parseInt(cls.replace("+", ""));
            if (weight > lower) return cls;
          }
        }
        return null;
      }

      function getHigherWeightClass(currentWc, ageGroup, gender) {
        if (!RULES.SPARRING[ageGroup]) return null;
        const classes = RULES.SPARRING[ageGroup][gender];
        if (!classes) return null;
        const idx = classes.indexOf(currentWc);
        if (idx !== -1 && idx < classes.length - 1) {
          return classes[idx + 1];
        }
        return null;
      }

      function getPersonCategories(person) {
        const age = getAge(person.birthdate);
        const ageGroup = getAgeGroup(age);
        const genderChar = (person.gender || "").trim().toUpperCase().startsWith("M") ? "M" : "F";
        
        let sparringCat = "";
        let sparringWc = null;
        if (person.sparring === "Yes") {
          sparringWc = getSparringWeightClass(ageGroup, genderChar, person.weight);
          sparringCat = `${ageGroup} - ${sparringWc || "N/A"}kg`;
        }

        let patternCat = "";
        if (person.patterns === "Yes") {
          const beltGroup = getBeltGroup(person.belt);
          patternCat = `${ageGroup} - ${beltGroup}`;
        }

        return { sparringCat, sparringWc, patternCat, ageGroup, genderChar };
      }

      // AUTHENTICATION LOGIC
      // ==========================================

        const { data: { session } } = await client.auth.getSession();

      }

      // ==========================================
      // MODAL & EDIT LOGIC
      // ==========================================
      function openPersonModal(personData, type, personId) {
        currentEditingPerson = { id: personId, type: type, data: personData };
        const modal = document.getElementById("infoModal");
        const title = document.getElementById("modalPersonTitle");
        const container = document.getElementById("modalStatsContainer");
        const box = document.getElementById("infoModalBox");
        box.classList.remove("editing");
        container.innerHTML = "";
        title.textContent = personData.name;

        if (type === 'comp') {
          createStatField(container, "Name", "name", personData.name);
          createStatField(container, "Birth Date", "birthdate", personData.birthdate, "date");
          createStatField(container, "Gender", "gender", personData.gender, "select", ["Male", "Female"]);
          createStatField(container, "Belt", "belt", personData.belt, "belt-select");
          createStatField(container, "Weight (kg)", "weight", personData.weight, "number");
          createStatField(container, "Sparring", "sparring", personData.sparring, "select", ["Yes", "No"]);
          createStatField(container, "Patterns", "patterns", personData.patterns, "select", ["Yes", "No"]);
        } else if (type === 'judge' || type === 'coach') {
          createStatField(container, "Name", "name", personData.name);
          createStatField(container, "Belt", "belt", personData.belt, "belt-select");
          createStatField(container, "Team", "team", personData.team);
        }
        modal.classList.add("active");
      }

      function closeModal() {
        document.getElementById("infoModal").classList.remove("active");
        currentEditingPerson = null;
      }

      function createStatField(container, label, key, value, inputType = "text", options = []) {
        const wrapper = document.createElement("div");
        if (label === "Weight (kg)" || label === "Name" || label === "Team") wrapper.className = "full-width"; 
        const labelEl = document.createElement("label");
        labelEl.className = "stat-label";
        labelEl.textContent = label;
        wrapper.appendChild(labelEl);
        const valEl = document.createElement("div");
        valEl.className = "stat-value";
        valEl.id = `val-${key}`;
        valEl.textContent = value || "-";
        wrapper.appendChild(valEl);
        const inpEl = document.createElement(inputType === "select" || inputType === "belt-select" ? "select" : "input");
        inpEl.className = "stat-input";
        inpEl.id = `inp-${key}`;
        inpEl.dataset.key = key; 
        
        if (inputType === "number") inpEl.type = "number";
        if (inputType === "date") inpEl.type = "date";

        if (inputType === "select") {
          options.forEach(opt => {
            const o = document.createElement("option");
            o.value = opt; o.textContent = opt;
            if (opt === value) o.selected = true;
            inpEl.appendChild(o);
          });
        } else if (inputType === "belt-select") {
          const belts = ["10 kup","9 kup","8 kup","7 kup","6 kup","5 kup","4 kup","3 kup","2 kup","1 kup","1 dan","2 dan","3 dan","4 dan","5 dan","6 dan"];
          belts.forEach(b => {
            const o = document.createElement("option");
            o.value = b; o.textContent = b;
            if (b === value) o.selected = true;
            inpEl.appendChild(o);
          });
        } else {
          inpEl.value = value;
        }
        wrapper.appendChild(inpEl);
        container.appendChild(wrapper);
      }

      function toggleEditMode() {
        const box = document.getElementById("infoModalBox");
        box.classList.add("editing");
      }

      async function savePersonChanges() {
        if (!currentEditingPerson) return;
        const inputs = document.querySelectorAll(".stat-input");
        const updateData = {};
        inputs.forEach(inp => { updateData[inp.dataset.key] = inp.value; });
        if (!updateData.name || !updateData.belt) { alert("Name and Belt are required."); return; }
        if (currentEditingPerson.type === 'comp' && !updateData.weight) { alert("Weight is required."); return; }
        const btn = document.querySelector(".btn-save");
        const originalText = btn.textContent;
        btn.textContent = "Saving..."; btn.disabled = true;
        let tableName = "";
        if (currentEditingPerson.type === 'comp') tableName = "competitors";
        else if (currentEditingPerson.type === 'judge') tableName = "judges";
        else if (currentEditingPerson.type === 'coach') tableName = "coaches";
        const { error } = await client.from(tableName).update(updateData).eq("id", currentEditingPerson.id);
        if (error) { alert("Error saving: " + error.message); btn.textContent = originalText; btn.disabled = false; }
        else {
          btn.textContent = originalText; btn.disabled = false;
          closeModal();
          const { data: { session } } = await client.auth.getSession();
          if(session) loadAllData(session.user.id);
        }
      }

      // ==========================================
      // DATA LOADING & RENDERING
      // ==========================================
      async function loadAllData(userId) {
        loadingOverlay.style.display = "flex";
        const { data: settings } = await client.from("site_settings").select("tournament_date").eq("id",1).single();
        if (settings && settings.tournament_date) tournamentDate = settings.tournament_date;
        const [compRes, judgeRes, coachRes] = await Promise.all([
          client.from("competitors").select("*").eq("user_id", userId),
          client.from("judges").select("*").eq("user_id", userId),
          client.from("coaches").select("*").eq("user_id", userId),
        ]);
        const { data: regData } = await client.from("final_registrations").select("*").eq("user_id", userId);
        const regMap = new Map();
        if (regData) regData.forEach(r => regMap.set(String(r.entry_id), r));
        renderSplitSection("comp", "Competitors", "fa-users", compRes.data || [], regMap);
        renderSplitSection("judge", "Judges", "fa-gavel", judgeRes.data || [], regMap);
        renderSplitSection("coach", "Coaches", "fa-chalkboard-teacher", coachRes.data || [], regMap);
        toggleSection("sec-competitors");
        loadingOverlay.style.display = "none";
      }

      function renderSplitSection(typeShort, typeName, iconClass, data, regMap) {
        const leftContainer = document.getElementById(`${typeShort}-left`);
        const rightContainer = document.getElementById(`${typeShort}-right`);
        leftContainer.innerHTML = ""; rightContainer.innerHTML = "";

        if (data.length === 0) {
          leftContainer.innerHTML = `<div style="color:var(--text-muted); font-style:italic; padding:1rem;">No ${typeName.toLowerCase()} found.</div>`;
          rightContainer.innerHTML = `<div style="color:var(--text-muted); font-style:italic; padding:1rem;">None registered yet.</div>`;
          return;
        }

        data.forEach(person => {
          const personIdStr = String(person.id);
          const isRegistered = !!regMap.get(personIdStr);
          const card = document.createElement("div");
          card.className = "person-card";
          
          // Header
          const headerDiv = document.createElement("div");
          headerDiv.className = "card-header-row";
          const nameDiv = document.createElement("div");
          nameDiv.className = "card-name";
          nameDiv.textContent = person.name;
          const infoBtn = document.createElement("div");
          infoBtn.className = "btn-info";
          infoBtn.innerHTML = '<i class="fas fa-info"></i>';
          infoBtn.addEventListener("click", (e) => { e.stopPropagation(); openPersonModal(person, typeShort, person.id); });
          headerDiv.appendChild(nameDiv);
          headerDiv.appendChild(infoBtn);
          card.appendChild(headerDiv);

          // Extras Panel (Only for Competitors)
          if (typeShort === 'comp') {
            const { sparringCat, sparringWc, patternCat, ageGroup, genderChar } = getPersonCategories(person);
            const catDiv = document.createElement("div");
            catDiv.className = "card-categories"; 
            
            // Standard Category Display
            if (sparringCat) catDiv.innerHTML += `<div class="cat-tag cat-spar"><i class="fas fa-fist-raised"></i> Sparring: ${sparringCat}</div>`;
            if (patternCat) catDiv.innerHTML += `<div class="cat-tag cat-pat"><i class="fas fa-chess-board"></i> Patterns: ${patternCat}</div>`;
            
            card.appendChild(catDiv);

            // Extras Panel
            const extrasPanel = document.createElement("div");
            extrasPanel.className = "extra-options-panel";
            
            // Helper to create rows
            const createExtraRow = (label, catName, key) => {
              const row = document.createElement("div");
              row.className = "extra-row";
              row.innerHTML = `
                <span class="extra-label">${label} <span class="extra-cat-name">${catName}</span></span>
                <input type="checkbox" class="extra-checkbox" data-key="${key}" data-cat="${catName}" data-person-id="${personIdStr}">
              `;
              // Prevent card click when clicking checkbox
              row.querySelector('input').addEventListener('click', (e) => e.stopPropagation());
              // Handle change
              row.querySelector('input').addEventListener('change', (e) => handleExtraChange(personIdStr, key, catName, e.target.checked));
              return row;
            };

            // Sparring Options
            if (person.sparring === "Yes" && sparringWc) {
              extrasPanel.appendChild(createExtraRow("Sparring: Main", sparringCat, "spar_main"));
              
              const nextW = getHigherWeightClass(sparringWc, ageGroup, genderChar);
              if (nextW) {
                const catUp = `${ageGroup} - ${nextW}kg`;
                extrasPanel.appendChild(createExtraRow("Sparring: +1 Weight", catUp, "spar_weight_up"));
              }

              const nextAg = getHigherAgeGroup(ageGroup);
              if (nextAg) {
                const catUpAg = `${nextAg} - ${sparringWc}kg`;
                extrasPanel.appendChild(createExtraRow("Sparring: +1 Age", catUpAg, "spar_age_up"));
              }
            }

            // Pattern Options
            if (person.patterns === "Yes") {
              extrasPanel.appendChild(createExtraRow("Patterns: Main", patternCat, "pat_main"));

              const nextAg = getHigherAgeGroup(ageGroup);
              if (nextAg) {
                const beltGroup = getBeltGroup(person.belt);
                const catUp = `${nextAg} - ${beltGroup}`;
                extrasPanel.appendChild(createExtraRow("Patterns: +1 Age", catUp, "pat_age_up"));
              }
            }
            
            card.appendChild(extrasPanel);
          }

          // Basic Details
          if (typeShort === 'comp') {
            const details = document.createElement("div");
            details.className = "card-details";
            details.innerHTML = `<div><i class="fas fa-weight"></i> ${person.weight}kg</div>`;
            card.appendChild(details);
          }

          if (isRegistered) {
            const btnUnreg = document.createElement("div");
            btnUnreg.className = "btn-unregister";
            btnUnreg.innerHTML = '<i class="fas fa-times"></i>';
            btnUnreg.addEventListener("click", async (e) => {
              e.stopPropagation();
              if(confirm(`Unregister ${person.name}?`)) {
                await client.from("final_registrations").delete().eq("id", regMap.get(personIdStr).id);
                const { data: { session } } = await client.auth.getSession();
                if(session) loadAllData(session.user.id);
              }
            });
            card.appendChild(btnUnreg);
            rightContainer.appendChild(card);
          } else {
            card.dataset.id = personIdStr;
            card.dataset.type = typeShort;
            card.dataset.raw = JSON.stringify(person);
            card.addEventListener("click", (e) => handleCardClick(card, e));
            leftContainer.appendChild(card);
          }
        });
      }

      function handleCardClick(card, e) {
        // Stop propagation if clicking controls inside
        if (e.target.closest('.btn-info') || e.target.closest('.extra-checkbox')) return;

        if (isExtraMode) {
          // Toggle expansion
          const isExpanded = card.classList.contains('expanded');
          // Collapse others
          document.querySelectorAll('.person-card.expanded').forEach(c => c.classList.remove('expanded'));
          if (!isExpanded) {
            card.classList.add('expanded');
          }
          // Don't select visually in extra mode (blue border) until we confirm which extras? 
          // OR: Selecting the main entry + checked extras.
          // For now, let's just make the click toggle expansion.
        } else {
          toggleSelection(card);
        }
      }

      function handleExtraChange(personId, key, catName, isChecked) {
        if (!selectedExtras.has(personId)) {
          selectedExtras.set(personId, {});
        }
        const map = selectedExtras.get(personId);
        map[key] = isChecked ? catName : null;
        updateUI();
      }

      function toggleSection(sectionId) {
        document.querySelectorAll(".split-content").forEach(el => el.classList.remove("open"));
        document.querySelectorAll(".category-header i.fa-chevron-up").forEach(el => {
            el.classList.remove("fa-chevron-up"); el.classList.add("fa-chevron-down");
        });
        const content = document.getElementById(`content-${sectionId}`);
        const icon = document.getElementById(`icon-${sectionId}`);
        if (!content.classList.contains("open")) {
          content.classList.add("open");
          icon.classList.remove("fa-chevron-down"); icon.classList.add("fa-chevron-up");
        }
      }

      function toggleSelection(card) {
        const id = card.dataset.id;
        if (selectedIds.has(id)) {
          selectedIds.delete(id);
          card.style.borderColor = "transparent";
          card.style.backgroundColor = "var(--bg-card)";
        } else {
          selectedIds.add(id);
          card.style.borderColor = "var(--accent-primary)";
          card.style.backgroundColor = "rgba(59, 130, 246, 0.1)";
        }
        updateUI();
      }

      function updateUI() {
        // In Extra Mode, we count distinct entries, not just people
        let totalEntries = 0;
        selectedIds.forEach(id => {
          // Base entry (assuming Main is always selected if in Extra Mode and card is expanded? 
          // Actually user needs to click card to select Main. 
          // Let's say: If in extra mode, clicking card expands, doesn't select. 
          // We need a way to confirm selection. 
          // Let's assume "Expanded" = Selected Main + checked extras.)
          // To simplify: Just count selected IDs for now. 
          // We'll handle the multi-entry in Submit.
          totalEntries++; 
        });

        // Count extras
        selectedExtras.forEach(map => {
          Object.values(map).forEach(val => {
            if(val) totalEntries++;
          });
        });

        selectedCountSpan.textContent = totalEntries;
        if (totalEntries > 0) {
          btnSubmit.disabled = false;
          btnSubmit.textContent = `Register ${totalEntries} Entries`;
        } else {
          btnSubmit.disabled = true;
          btnSubmit.textContent = "Select Participants";
        }
      }

      btnSubmit.addEventListener("click", async () => {
        if (selectedIds.size === 0 && selectedExtras.size === 0) return;
        loadingOverlay.style.display = "flex";
        const insertData = [];
        const { data: { session } } = await client.auth.getSession();
        if (!session) return;

        // Helper to process a card
        const processCard = (cardId, cardData, type, isMainSelected) => {
          if (!isMainSelected && !selectedExtras.has(cardId)) return; // Ignore

          // Determine Main Categories
          const cats = getPersonCategories(cardData);
          const entriesList = [];

          // 1. Main Sparring Entry
          if (cardData.sparring === "Yes" && (isMainSelected || (selectedExtras.get(cardId)?.spar_main))) {
             entriesList.push({
               discipline: "sparring",
               label: "Main",
               age_group: cats.ageGroup,
               weight: cats.sparringWc,
               full_cat: cats.sparringCat
             });
          }

          // 2. Weight Up Sparring
          if (selectedExtras.get(cardId)?.spar_weight_up) {
             const nextW = getHigherWeightClass(cats.sparringWc, cats.ageGroup, cats.genderChar);
             entriesList.push({
               discipline: "sparring",
               label: "Weight Up",
               age_group: cats.ageGroup,
               weight: nextW,
               full_cat: `${cats.ageGroup} - ${nextW}kg`
             });
          }

          // 3. Age Up Sparring
          if (selectedExtras.get(cardId)?.spar_age_up) {
             const nextAg = getHigherAgeGroup(cats.ageGroup);
             // Re-calculate weight for new age? Or keep weight?
             // Usually you enter the weight class of the NEW age group.
             // Let's find the weight class in the NEW age group corresponding to current weight.
             const nextAgWC = getSparringWeightClass(nextAg, cats.genderChar, cardData.weight);
             entriesList.push({
               discipline: "sparring",
               label: "Age Up",
               age_group: nextAg,
               weight: nextAgWC,
               full_cat: `${nextAg} - ${nextAgWC}kg`
             });
          }

          // 4. Main Patterns
          if (cardData.patterns === "Yes" && (isMainSelected || (selectedExtras.get(cardId)?.pat_main))) {
             entriesList.push({
               discipline: "patterns",
               label: "Main",
               age_group: cats.ageGroup,
               belt: getBeltGroup(cardData.belt),
               full_cat: cats.patternCat
             });
          }

          // 5. Age Up Patterns
          if (selectedExtras.get(cardId)?.pat_age_up) {
             const nextAg = getHigherAgeGroup(cats.ageGroup);
             const beltGroup = getBeltGroup(cardData.belt);
             entriesList.push({
               discipline: "patterns",
               label: "Age Up",
               age_group: nextAg,
               belt: beltGroup,
               full_cat: `${nextAg} - ${beltGroup}`
             });
          }

          if (entriesList.length === 0) return;

          // Insert one row for the person, with entries_list
          insertData.push({
            user_id: session.user.id,
            entry_type: type,
            entry_id: cardId,
            entry_data: {
               ...cardData,
               entries_list: entriesList // Important for future bracket logic
            }
          });
        };

        // Iterate Cards
        const cards = document.querySelectorAll(".col-left .person-card");
        cards.forEach(card => {
          const id = card.dataset.id;
          const raw = JSON.parse(card.dataset.raw);
          const type = card.dataset.type;
          const isSelected = selectedIds.has(id);

          if (type === 'comp') {
            processCard(id, raw, type, isSelected);
          } else {
            if (isSelected) {
              insertData.push({
                user_id: session.user.id,
                entry_type: type,
                entry_id: id,
                entry_data: raw
              });
            }
          }
        });

        const { error } = await client.from("final_registrations").insert(insertData);
        loadingOverlay.style.display = "none";

        if (error) {
          alert("Error registering: " + error.message);
        } else {
          alert("Successfully registered " + insertData.length + " entries!");
          window.location.reload();
        }
      });

      document.addEventListener("DOMContentLoaded", checkSession);
    </script>
  </body>
</html>
